<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>압타밀 아웃바운드 상담원 전용 페이지</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-wrap { max-width: 100%; margin: 0 auto; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .admin-header h1 { margin: 0; font-size: 18px; }
    .admin-table-wrapper { overflow-x: auto; margin-top: 12px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 2px 4px; text-align: left; vertical-align: middle; white-space: nowrap; }
    .admin-table th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
    .admin-table .cell-text { display: inline-block; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .admin-table .cell-seq { text-align: center; font-weight: 600; }
    .admin-table .cell-project { text-align: center; }
    .admin-pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .admin-page-info { font-size: 12px; color: #555; }
    .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; }
    .status-dot.ok { background: #28a745; }
    .status-dot.off { background: #dc3545; }
    .btn-load { margin-bottom: 8px; }
    .cell-tooltip-bubble {
      position: fixed;
      z-index: 99999;
      max-width: 320px;
      padding: 10px 14px;
      background: #2d2d2d;
      color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease, visibility 0.15s ease;
    }
    .cell-tooltip-bubble.show {
      opacity: 1;
      visibility: visible;
    }
    .admin-table .cell-text, .admin-table td[data-fulltext] { cursor: default; }
    .admin-table tr.row-no-check { background-color: #e3f2fd; } /* 환불·교환 미체크 + 잘못된정보 미체크 — 푸른 파스텔 */
    .admin-table tr.row-proof-error { background-color: #ffebee; } /* 증빙오류(반려) — 붉은 파스텔 */
    .admin-search .btn,
    .admin-search a.btn {
      padding: 8px 14px;
      font-size: 13px;
      min-height: 36px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      white-space: nowrap;
      border-radius: 6px;
      font-weight: 600;
    }
    .admin-search { align-items: center; }
    /* 전체화면 상세 모달 (사진 + 고객정보/체크) */
    .detail-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0,0,0,0.6);
      overflow: auto;
      padding: 16px;
      box-sizing: border-box;
    }
    .detail-modal-overlay.show { display: block; }
    .detail-modal-box {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      overflow: hidden;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .detail-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
    }
    .detail-modal-close {
      padding: 8px 16px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .detail-modal-close:hover { background: #555; }
    .detail-modal-body {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      gap: 0;
    }
    .detail-modal-photos {
      flex: 1 1 420px;
      min-width: 280px;
      padding: 20px;
      border-right: 1px solid #e0e0e0;
      overflow: auto;
    }
    .detail-modal-photos h3 { margin: 0 0 12px 0; font-size: 14px; color: #333; }
    .detail-modal-photo-box { margin-bottom: 20px; }
    .detail-modal-photo-box .caption { font-size: 12px; color: #666; margin-bottom: 8px; }
    .detail-modal-photo-box img {
      max-width: 100%;
      max-height: 220px;
      cursor: pointer;
      display: block;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .detail-modal-photo-box .no-image { color: #999; font-size: 13px; }
    .detail-modal-photo-box img { cursor: zoom-in; }
    /* 포토 줌 오버레이 (photo_view와 동일 기능) */
    .photo-zoom-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); z-index: 10002; display: none; align-items: center; justify-content: center; cursor: default; }
    .photo-zoom-overlay.show { display: flex; }
    .photo-zoom-img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; cursor: zoom-in; transition: transform 0.1s ease-out; transform-origin: center center; }
    .photo-zoom-img.zoomed { cursor: move; }
    .photo-zoom-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 32px; font-weight: bold; cursor: pointer; background: rgba(0, 0, 0, 0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 10003; }
    .photo-zoom-close:hover { background: rgba(0, 0, 0, 0.8); }
    .photo-zoom-nav { position: absolute; top: 50%; transform: translateY(-50%); color: #fff; font-size: 48px; font-weight: bold; cursor: pointer; background: rgba(0, 0, 0, 0.5); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 10003; transition: background 0.2s; border: none; }
    .photo-zoom-nav:hover { background: rgba(0, 0, 0, 0.8); }
    .photo-zoom-nav.prev { left: 20px; }
    .photo-zoom-nav.next { right: 20px; }
    .photo-zoom-nav.disabled { opacity: 0.3; cursor: not-allowed; }
    .photo-zoom-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; background: rgba(0, 0, 0, 0.5); padding: 8px 16px; border-radius: 20px; z-index: 10003; }
    .photo-zoom-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 12px; background: rgba(0, 0, 0, 0.7); padding: 8px 16px; border-radius: 20px; z-index: 10003; text-align: center; line-height: 1.5; }
    .photo-zoom-hint.hidden { display: none; }
    .detail-modal-info {
      flex: 1 1 380px;
      min-width: 280px;
      padding: 20px;
      overflow: auto;
    }
    .detail-modal-info h3 { margin: 0 0 12px 0; font-size: 14px; color: #333; border-bottom: 1px solid #e0e0e0; padding-bottom: 8px; }
    .detail-modal-info .info-section { margin-bottom: 20px; }
    .detail-modal-info .info-row { margin-bottom: 8px; font-size: 13px; }
    .detail-modal-info .info-row strong { display: inline-block; width: 110px; color: #555; flex-shrink: 0; }
    .detail-modal-info .info-grid { display: grid; gap: 8px; }
    .detail-modal-info .product-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .detail-modal-info .product-table th, .detail-modal-info .product-table td { border: 1px solid #e0e0e0; padding: 6px 8px; text-align: left; }
    .detail-modal-info .product-table th { background: #f5f5f5; font-weight: 600; }
    .detail-modal-info .product-table tr:nth-child(even) { background: #fafafa; }
    .detail-modal-flags { margin-top: 16px; }
    .detail-modal-flags .checkbox-group { display: flex; flex-wrap: wrap; gap: 16px 24px; margin: 12px 0; }
    .detail-modal-flags .checkbox-group label { display: inline-flex; align-items: center; font-size: 13px; cursor: pointer; margin: 0; }
    .detail-modal-flags .checkbox-group input[type="checkbox"] { margin-right: 6px; }
    .detail-modal-flags .status-readonly { font-size: 12px; color: #666; margin-top: 8px; padding: 8px 12px; background: #f9f9f9; border-radius: 4px; }
    .detail-modal-flags textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      margin-top: 8px;
      resize: vertical;
    }
    .processing-history { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
    .processing-history h4 { margin: 0 0 8px 0; font-size: 13px; color: #333; }
    .processing-history-item { font-size: 12px; color: #666; margin-bottom: 6px; padding: 8px; background: #f9f9f9; border-radius: 4px; }
    .processing-history-item strong { color: #333; }
    .counseling-history-list { max-height: 120px; overflow-y: auto; margin-bottom: 12px; }
    .counseling-history-item { font-size: 12px; padding: 8px; background: #f0f7ff; border-radius: 4px; margin-bottom: 6px; border-left: 3px solid #17a; }
    /* 상담이력 전용 간단한 모달 */
    .counseling-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10001;
      background: rgba(0,0,0,0.6);
      overflow: auto;
      padding: 20px;
      box-sizing: border-box;
      align-items: center;
      justify-content: center;
    }
    .counseling-modal-overlay.show { display: flex; }
    .counseling-modal-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      max-width: 600px;
      width: 100%;
      padding: 0;
      overflow: hidden;
    }
    .counseling-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
    }
    .counseling-modal-close {
      padding: 6px 12px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .counseling-modal-close:hover { background: #555; }
    .counseling-modal-body {
      padding: 20px;
    }
    .counseling-modal-body h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #333;
    }
    .counseling-modal-body textarea {
      width: 100%;
      min-height: 150px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
      box-sizing: border-box;
    }
    .counseling-modal-body .customer-info {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 6px;
    }
    .counseling-modal-body .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: flex-end;
    }
    .counseling-modal-body .btn {
      width: auto;
      margin: 0;
      padding: 10px 20px;
    }
    /* 유선안내완료 고객 재접수 블록 */
    .resubmission-block {
      margin-bottom: 16px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      border: 1px solid #81c784;
      border-radius: 10px;
      border-left: 4px solid #2e7d32;
    }
    .resubmission-block h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #1b5e20;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .resubmission-block .resubmission-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 22px;
      padding: 0 8px;
      background: #2e7d32;
      color: #fff;
      border-radius: 11px;
      font-size: 12px;
      font-weight: 700;
    }
    .resubmission-block .resubmission-hint {
      font-size: 12px;
      color: #555;
      margin-bottom: 10px;
    }
    .resubmission-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    .resubmission-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #a5d6a7;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    .resubmission-item:hover {
      background: #f1f8e9;
    }
    .resubmission-item .resubmission-item-info { flex: 1; }
    .resubmission-item .resubmission-item-date { color: #666; font-size: 11px; margin-left: 8px; }
    /* 카톡 스타일 알림 토스트 */
    .resubmission-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10005;
      max-width: 360px;
      padding: 16px 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      border-left: 4px solid #2e7d32;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
    }
    .resubmission-toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .resubmission-toast .toast-title {
      font-weight: 700;
      font-size: 14px;
      color: #1b5e20;
      margin-bottom: 6px;
    }
    .resubmission-toast .toast-body {
      font-size: 13px;
      color: #333;
      margin-bottom: 12px;
      line-height: 1.45;
    }
    .resubmission-toast .toast-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .resubmission-toast .toast-btn:hover { background: #1b5e20; }
  </style>
</head>
<body>
  <div id="cellTooltip" class="cell-tooltip-bubble" aria-hidden="true"></div>
  <div class="admin-lock-backdrop" id="adminLock">
    <div class="admin-lock-modal">
      <h2>아웃바운드 상담원 전용 페이지</h2>
      <input type="email" class="admin-lock-input" id="adminEmail" placeholder="이메일" autocomplete="username">
      <input type="password" class="admin-lock-input" id="adminPassword" placeholder="비밀번호" autocomplete="current-password">
      <div class="admin-lock-error" id="adminLockError"></div>
      <button type="button" class="btn btn-primary" id="adminUnlockBtn" style="width:100%;">로그인</button>
    </div>
  </div>

  <div class="admin-wrap">
    <div id="listView" style="display:none;">
      <div class="admin-header">
        <h1>압타밀 아웃바운드 상담원 전용 페이지</h1>
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <span id="adminUserEmail" style="font-size: 12px; color: #666;"></span>
          <button type="button" class="btn" id="adminLogoutBtn" style="background: #666; color: #fff; font-size: 12px;">로그아웃</button>
          <div class="status-indicator">
            <span class="status-dot" id="statusDotAdmin"></span>
            <span id="statusTextAdmin">서버 연결 확인 중…</span>
          </div>
        </div>
      </div>
      <div class="detail-section" style="margin-bottom: 12px;">
        <h2 style="font-size: 14px; margin: 0 0 8px 0;">조회 구분</h2>
        <div class="admin-search" style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px;">
          <label style="font-size: 12px;">구분:</label>
          <select id="viewFilterSelect" style="padding: 6px 8px; font-size: 12px;">
            <option value="noCallComplete">유선안내 미완료 (해야 할 일)</option>
            <option value="callComplete">내가 처리한 건</option>
            <option value="finalUnreached">최종미연결</option>
            <option value="postProcessing">후처리관리중</option>
            <option value="all">전체 (배정된 건)</option>
            <option value="proofError">증빙오류(반려)</option>
            <option value="noRefundExchange">환불·교환 모두 미체크 (접수시)</option>
          </select>
          <span id="csSectionSummary" style="font-size: 12px; font-weight: 600; color: #17a; margin-left: 12px;"></span>
        </div>
        <h2 style="font-size: 14px; margin: 0 0 8px 0;">고객 조회</h2>
        <div class="admin-search" style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
          <input type="text" id="searchName" placeholder="이름" style="padding: 6px 8px; font-size: 12px;">
          <input type="text" id="searchContact" placeholder="전화번호" style="padding: 6px 8px; font-size: 12px;">
          <input type="text" id="searchCustoms" placeholder="통관번호(개인통관부호)" style="padding: 6px 8px; font-size: 12px;">
          <input type="text" id="searchUniqueCode" placeholder="고유번호" style="padding: 6px 8px; font-size: 12px;">
          <button type="button" class="btn btn-primary" id="searchBtn" style="width: auto; margin-top: -1px;">검색</button>
          <button type="button" class="btn" id="searchResetBtn" style="width: auto; background: #777; color: #fff;">초기화</button>
          <button type="button" class="btn" id="listRefreshBtn" style="width: auto; background: #0a5; color: #fff;">목록 새로고침</button>
        </div>
      </div>
      <div style="margin-bottom: 12px;">
        <p class="msg ubase-notice" style="background:#fff3cd; color:#856404; border-left:4px solid #ffc107;"><strong>공지:</strong> 아웃바운드 상담원 전용 페이지입니다. 유선안내 완료 체크 및 상담이력 기재가 가능합니다.</p>
        <p class="msg ubase-notice" style="background:#fff; color:#555; border-left:4px solid #17a; font-size:12px; margin-top:8px;"><strong>행 색상:</strong> <span style="background:#e3f2fd;padding:2px 6px;border-radius:4px;">푸른색</span> = 환불·교환 모두 미체크 또는 잘못된정보 체크 · <span style="background:#ffebee;padding:2px 6px;border-radius:4px;">붉은색</span> = 증빙오류(반려)</p>
      </div>
      <div id="listMessage"></div>
      <div id="resubmissionBlock" class="resubmission-block" style="display: none;"></div>
      <div id="submissionList"></div>
    </div>
  </div>

  <!-- 전체화면 상세 모달: 사진 + 고객정보/체크 -->
  <div id="detailModal" class="detail-modal-overlay" aria-hidden="true">
    <div class="detail-modal-box">
      <div class="detail-modal-header">
        <span id="detailModalTitle">고객 상세 · 사진 보기</span>
        <button type="button" class="detail-modal-close" id="detailModalClose">닫기</button>
      </div>
      <div class="detail-modal-body">
        <div class="detail-modal-photos" id="detailModalPhotos">사진 불러오는 중…</div>
        <div class="detail-modal-info" id="detailModalInfo">
          <div id="detailModalInfoRows"></div>
          <div class="detail-modal-flags" id="detailModalFlags"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 사진 확대/축소 오버레이 (상세 모달 내 사진 클릭 시) -->
  <div id="photoZoomOverlay" class="photo-zoom-overlay">
    <span class="photo-zoom-close" id="photoZoomClose">&times;</span>
    <div class="photo-zoom-hint" id="photoZoomHint">Ctrl + 휠: 확대/축소 | 휠: 스크롤 이동 | ←/→: 사진 전환</div>
    <button type="button" class="photo-zoom-nav prev" id="photoZoomPrev">‹</button>
    <button type="button" class="photo-zoom-nav next" id="photoZoomNext">›</button>
    <img id="photoZoomImg" class="photo-zoom-img" src="" alt="확대 사진">
    <div class="photo-zoom-counter" id="photoZoomCounter"></div>
  </div>

  <!-- 상담이력 전용 간단한 모달 -->
  <div id="counselingModal" class="counseling-modal-overlay" aria-hidden="true">
    <div class="counseling-modal-box">
      <div class="counseling-modal-header">
        <span id="counselingModalTitle">상담이력 입력</span>
        <button type="button" class="counseling-modal-close" id="counselingModalClose">닫기</button>
      </div>
      <div class="counseling-modal-body">
        <div id="counselingModalCustomerInfo" class="customer-info"></div>
        <div id="counselingModalHistoryList" style="margin-bottom: 16px;"></div>
        <h3>새 상담이력 입력</h3>
        <textarea id="counselingModalTextarea" placeholder="상담이력을 입력하세요."></textarea>
        <div class="btn-group">
          <button type="button" class="btn" id="counselingModalCancelBtn" style="background: #777; color: #fff;">취소</button>
          <button type="button" class="btn btn-primary" id="counselingModalSaveBtn">저장</button>
        </div>
      </div>
    </div>
  </div>

  <div id="resubmissionToast" class="resubmission-toast" aria-live="polite">
    <div class="toast-title">유선안내완료 고객 재접수</div>
    <div class="toast-body" id="resubmissionToastBody"></div>
    <button type="button" class="toast-btn" id="resubmissionToastBtn">확인</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getDatabase,
      ref as dbRef,
      get,
      child,
      onValue,
      update,
      push,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    // 아웃바운드 상담원 계정 (cs1@ubase.co.kr ~ cs10@ubase.co.kr)
    const ALLOWED_EMAILS = [];
    for (let i = 1; i <= 10; i++) {
      ALLOWED_EMAILS.push(`cs${i}@ubase.co.kr`);
    }

    const PREFIXES = ['nutricia-x9fQ2kM7-1', 'nutricia-aL4pZ8Tq-2', 'nutricia-nu7VnCwR3H-3', 'nutricia-MK2rP9dS-4'];
    const PROJECT_LABELS = ['아이베', '림인터네셔널', '크린랩', '몰테일'];

    const firebaseConfig = {
      apiKey: "AIzaSyCxNwnAzMn0JUkHGDXgY4taTPJYeABDohg",
      authDomain: "eibe-nutricia.firebaseapp.com",
      databaseURL: "https://eibe-nutricia-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "eibe-nutricia",
      storageBucket: "eibe-nutricia.firebasestorage.app",
      messagingSenderId: "605906618980",
      appId: "1:605906618980:web:d947540696a573c4856d71"
    };

    let app, db, auth;
    try {
      app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      auth = getAuth(app);
    } catch (err) {
      console.error('Firebase 초기화 오류:', err);
    }

    const adminLock = document.getElementById('adminLock');
    const adminEmailInput = document.getElementById('adminEmail');
    const adminKeyInput = document.getElementById('adminPassword');
    const adminLockError = document.getElementById('adminLockError');
    const adminUnlockBtn = document.getElementById('adminUnlockBtn');
    const adminLogoutBtn = document.getElementById('adminLogoutBtn');
    const adminUserEmailEl = document.getElementById('adminUserEmail');
    const listEl = document.getElementById('submissionList');
    const listView = document.getElementById('listView');
    const statusDotAdmin = document.getElementById('statusDotAdmin');
    const statusTextAdmin = document.getElementById('statusTextAdmin');
    const searchNameInput = document.getElementById('searchName');
    const searchContactInput = document.getElementById('searchContact');
    const searchCustomsInput = document.getElementById('searchCustoms');
    const searchBtn = document.getElementById('searchBtn');
    const searchResetBtn = document.getElementById('searchResetBtn');

    const PAGE_SIZE = 30;
    let allItems = [];
    let paginationPage = 1;
    let searchFilters = { name: '', contact: '', customsCode: '', uniqueCode: '' };
    let viewFilter = 'noCallComplete'; // 기본: 유선안내 미완료 (해야 할 일 먼저)
    let metaSnaps = {};
    let currentDetailData = null;
    let currentUserEmail = '';
    let isSigningOut = false; // 무한 루프 방지 플래그
    let lastCheckedEmail = ''; // 마지막으로 확인한 이메일 (중복 체크 방지)
    
    // 로컬 스토리지: 처리내역 및 상담이력 저장 (목업용 - CS 계정이 작성)
    // key: `${prefix}_${dateKey}_${id}`
    // 처리 내역과 상담 이력은 CS 계정이 작성하고, 대시보드는 읽기만 함
    async function loadProcessingHistoryFromFirebase() {
      if (!db) return;
      const procMap = new Map();
      try {
        for (const prefix of PREFIXES) {
          const procSnap = await get(dbRef(db, prefix + '/processing_history'));
          if (procSnap.exists()) {
            const procVal = procSnap.val();
            if (procVal && typeof procVal === 'object') {
              Object.keys(procVal).forEach((dateKey) => {
                if (!/^\d{8}$/.test(dateKey)) return;
                const dateObj = procVal[dateKey];
                if (!dateObj || typeof dateObj !== 'object') return;
                Object.keys(dateObj).forEach((id) => {
                  const idVal = dateObj[id];
                  const arr = [];
                  if (idVal && typeof idVal === 'object' && !Array.isArray(idVal)) {
                    Object.keys(idVal).forEach((k) => {
                      const h = idVal[k];
                      if (h && typeof h === 'object' && (h.account != null || h.changes != null)) {
                        arr.push({ account: h.account || '', timestamp: h.timestamp || 0, changes: String(h.changes || '') });
                      }
                    });
                  }
                  if (arr.length) procMap.set(`${prefix}_${dateKey}_${id}`, arr.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                });
              });
            }
          }
        }
        processingHistoryMap = procMap;
      } catch (err) {
        console.error('처리내역 로드 오류:', err);
      }
    }

    const DISTRIBUTION_PATH = 'outbound_distribution/assignments';
    function ensureHistoryArray(val) {
      if (Array.isArray(val)) return val;
      if (val && typeof val === 'object') return Object.keys(val).sort((a, b) => Number(a) - Number(b)).map(k => val[k]);
      return [];
    }
    // 분배 이력: Firebase에서 로드 (대시보드가 관리, CS는 읽기만)
    async function loadDistributionHistoryFromFirebase() {
      if (!db) return new Map();
      try {
        const snap = await get(dbRef(db, DISTRIBUTION_PATH));
        if (!snap.exists()) return new Map();
        const data = snap.val();
        if (!data || typeof data !== 'object') return new Map();
        const map = new Map();
        Object.entries(data).forEach(([k, v]) => map.set(k, ensureHistoryArray(v)));
        return map;
      } catch (e) {
        console.error('분배 이력 로드 오류:', e);
        return new Map();
      }
    }

    let processingHistoryMap = new Map();
    let distributionHistoryMap = new Map();

    // 유선안내완료 여부: processing history에서 최신 변경 기준 (체크→해제 시 현재 미완료로 판정)
    function isCallCompleteForKey(processingHistory) {
      if (!Array.isArray(processingHistory) || processingHistory.length === 0) return false;
      const sorted = [...processingHistory].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      for (const h of sorted) {
        if (h.changes && typeof h.changes === 'string') {
          if (h.changes.includes('유선안내완료: 체크')) return true;
          if (h.changes.includes('유선안내완료: 해제')) return false;
        }
      }
      return false;
    }
    // 최종미연결 여부: processing history에서 최신 변경 기준
    function isFinalUnreachedForKey(processingHistory) {
      if (!Array.isArray(processingHistory) || processingHistory.length === 0) return false;
      const sorted = [...processingHistory].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      for (const h of sorted) {
        if (h.changes && typeof h.changes === 'string') {
          if (h.changes.includes('최종미연결: 체크')) return true;
          if (h.changes.includes('최종미연결: 해제')) return false;
        }
      }
      return false;
    }
    // 후처리관리중 여부: processing history에서 최신 변경 기준
    function isPostProcessingForKey(processingHistory) {
      if (!Array.isArray(processingHistory) || processingHistory.length === 0) return false;
      const sorted = [...processingHistory].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      for (const h of sorted) {
        if (h.changes && typeof h.changes === 'string') {
          if (h.changes.includes('후처리관리중: 체크')) return true;
          if (h.changes.includes('후처리관리중: 해제')) return false;
        }
      }
      return false;
    }
    // 유선안내완료 체크한 상담사(처리한 사람) 반환. 체크된 경우 해당 account, 미체크면 null
    function getProcessedByAccount(processingHistory) {
      if (!Array.isArray(processingHistory) || processingHistory.length === 0) return null;
      const sorted = [...processingHistory].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      for (const h of sorted) {
        if (h.changes && typeof h.changes === 'string') {
          if (h.changes.includes('유선안내완료: 체크')) return (h.account || '').trim() || null;
          if (h.changes.includes('유선안내완료: 해제')) return null;
        }
      }
      return null;
    }

    // 유선안내완료 체크 이벤트의 시점 반환 (최신 '체크' 기준). 재접수 판별용
    function getCallCompleteTimestampFromPh(processingHistory) {
      if (!Array.isArray(processingHistory) || processingHistory.length === 0) return null;
      const sorted = [...processingHistory].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      for (const h of sorted) {
        if (h.changes && typeof h.changes === 'string') {
          if (h.changes.includes('유선안내완료: 체크')) return h.timestamp || null;
          if (h.changes.includes('유선안내완료: 해제')) return null;
        }
      }
      return null;
    }

    const LOOKBACK_DAYS = 90; // 유선안내완료 조회 기간(일). 이 기간 안에 완료된 고객만 재접수 후보로 사용
    // 본인이 유선안내완료 처리한 연락처 → 완료 시점 (최근 90일 이내만)
    function buildContactToCallCompleteMapForCurrentUser() {
      const map = new Map();
      const email = (currentUserEmail || '').toLowerCase();
      if (!email) return map;
      const cutoff = Date.now() - LOOKBACK_DAYS * 24 * 60 * 60 * 1000;
      allItems.forEach((d) => {
        const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
        const ph = processingHistoryMap.get(key) || [];
        const processedBy = getProcessedByAccount(ph);
        if (!processedBy || processedBy.toLowerCase() !== email) return;
        if (!isCallCompleteForKey(ph)) return;
        const ts = getCallCompleteTimestampFromPh(ph);
        if (ts == null || ts < cutoff) return;
        const norm = normalizePhone(d.contact);
        if (!norm) return;
        const existing = map.get(norm);
        if (existing == null || ts < existing) map.set(norm, ts);
      });
      return map;
    }

    // 본인이 안내 완료한 고객(연락처)의 미완료 접수건 반환. 유선안내 체크 전에 새로 등록한 건도 포함. 이미 유선안내완료한 건은 제외(목록에서 사라짐)
    function getMyResubmissionItems() {
      const contactMap = buildContactToCallCompleteMapForCurrentUser();
      return allItems.filter((d) => {
        const norm = normalizePhone(d.contact);
        if (!norm) return false;
        if (!contactMap.has(norm)) return false;
        const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
        const ph = processingHistoryMap.get(key) || [];
        if (ph.length > 0 ? isCallCompleteForKey(ph) : !!d.callComplete) return false;
        return true;
      });
    }

    function normalizePhone(v) {
      return (v || '').replace(/\D/g, '');
    }
    // 고객별 상담이력 저장/조회 시 동일 키 보장 (82/010 혼용 시에도 같은 키로)
    function canonicalPhoneKeyForHistory(contact) {
      const digits = normalizePhone(contact);
      if (!digits) return '';
      if (digits.length >= 11 && digits.startsWith('82')) return '0' + digits.slice(2);
      if (digits.length === 10 && digits.startsWith('10')) return '0' + digits;
      return digits;
    }
    function contactMatches(storedContact, searchContact) {
      const s = normalizePhone(storedContact);
      const q = normalizePhone(searchContact);
      if (!q) return true;
      if (!s) return false;
      return s === q || s === '82' + q || s.replace(/^82/, '') === q;
    }

    let statusTimeout = null;
    let lastConnectedState = true;
    
    function setStatus(connected) {
      if (!statusDotAdmin || !statusTextAdmin) return;
      if (connected === lastConnectedState) return;
      lastConnectedState = connected;
      if (statusTimeout) {
        clearTimeout(statusTimeout);
        statusTimeout = null;
      }
      if (connected) {
        statusDotAdmin.classList.remove('ok', 'off');
        statusDotAdmin.classList.add('ok');
        statusTextAdmin.textContent = '서버 연결 정상';
      } else {
        statusTimeout = setTimeout(() => {
          statusDotAdmin.classList.remove('ok', 'off');
          statusDotAdmin.classList.add('off');
          statusTextAdmin.textContent = '서버 연결 안 됨';
        }, 1000);
      }
    }

    if (db) {
      onValue(dbRef(db, '.info/connected'), (snap) => setStatus(snap.val() === true), () => setStatus(false));
    }

    function doLoad() {
      if (!db) {
        listEl.innerHTML = '<div class="msg error">Firebase가 초기화되지 않았습니다.</div>';
        return;
      }
      loadMetaOnce();
    }

    function showAdminUI(user) {
      if (adminLock) adminLock.style.display = 'none';
      listView.style.display = 'block';
      currentUserEmail = user.email || '';
      if (adminUserEmailEl) adminUserEmailEl.textContent = currentUserEmail;
      subscribeDistributionHistory();
      doLoad();
    }
    function showLoginUI() {
      if (adminLock) adminLock.style.display = 'flex';
      listView.style.display = 'none';
      if (adminLockError) adminLockError.textContent = '';
      if (distributionUnsubscribe) {
        distributionUnsubscribe();
        distributionUnsubscribe = null;
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!auth) return;
      if (isSigningOut) return; // signOut 진행 중이면 무시
      
      if (!user) {
        // 로그아웃 상태
        if (currentUserEmail) {
          currentUserEmail = '';
          lastCheckedEmail = '';
          showLoginUI();
        }
        return;
      }
      
      const email = (user.email || '').trim().toLowerCase();
      
      // 같은 이메일로 이미 체크했다면 무시 (중복 체크 방지)
      if (email === lastCheckedEmail && currentUserEmail === email) {
        return;
      }
      
      lastCheckedEmail = email;
      const allowed = ALLOWED_EMAILS.some((e) => e.toLowerCase() === email);
      
      if (allowed) {
        showAdminUI(user);
      } else {
        // 권한이 없는 계정이면 로그아웃
        isSigningOut = true;
        signOut(auth).then(() => {
          isSigningOut = false;
          currentUserEmail = '';
          lastCheckedEmail = '';
          showLoginUI();
          if (adminLockError) adminLockError.textContent = '이 페이지에 접근 권한이 있는 계정이 아닙니다.';
        }).catch(() => {
          isSigningOut = false;
        });
      }
    });

    function handleLogin() {
      const email = (adminEmailInput && adminEmailInput.value) ? adminEmailInput.value.trim() : '';
      const password = adminKeyInput ? adminKeyInput.value : '';
      if (!email || !password) {
        adminLockError.textContent = '이메일과 비밀번호를 입력해 주세요.';
        return;
      }
      adminLockError.textContent = '';
      adminUnlockBtn.disabled = true;
      signInWithEmailAndPassword(auth, email, password)
        .then(() => { adminUnlockBtn.disabled = false; })
        .catch((err) => {
          adminUnlockBtn.disabled = false;
          if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
            adminLockError.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
          } else {
            adminLockError.textContent = err.message || '로그인에 실패했습니다.';
          }
        });
    }
    adminUnlockBtn.addEventListener('click', handleLogin);
    adminKeyInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') handleLogin(); });
    if (adminEmailInput) adminEmailInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') handleLogin(); });
    if (adminLogoutBtn) adminLogoutBtn.addEventListener('click', () => {
      isSigningOut = true;
      signOut(auth).then(() => {
        isSigningOut = false;
        currentUserEmail = '';
        showLoginUI();
      }).catch(() => {
        isSigningOut = false;
      });
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && listView && listView.style.display !== 'none') {
        if (Object.keys(metaSnaps).length === 0) {
          loadMetaOnce();
        } else {
          renderTable();
        }
      }
    });

    // 대시보드에서 분배 시 Firebase 실시간 반영
    let distributionUnsubscribe = null;
    function subscribeDistributionHistory() {
      if (!db) return;
      if (distributionUnsubscribe) distributionUnsubscribe();
      distributionUnsubscribe = onValue(dbRef(db, DISTRIBUTION_PATH), (snap) => {
        if (!snap.exists()) {
          distributionHistoryMap = new Map();
        } else {
          const data = snap.val();
          distributionHistoryMap = new Map(Object.entries(data || {}));
        }
        if (listView && listView.style.display !== 'none' && Object.keys(metaSnaps).length === PREFIXES.length) {
          renderTable();
        }
      });
    }

    function formatDate(t) {
      if (!t) return '-';
      const d = typeof t === 'number' ? new Date(t) : new Date(t);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function escapeAttr(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function buildItemsFromMetaSnaps() {
      const items = [];
      PREFIXES.forEach((prefix, idx) => {
        const snap = metaSnaps[prefix];
        if (!snap || !snap.exists()) return;
        snap.forEach((dateSnap) => {
          const dateKey = dateSnap.key;
          if (!/^\d{8}$/.test(dateKey)) return;
          dateSnap.forEach((inner) => {
            items.push({
              _prefix: prefix,
              _projectIndex: idx + 1,
              id: inner.key,
              _dateKey: dateKey,
              _isLegacy: false,
              ...inner.val()
            });
          });
        });
      });
      items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      const total = items.length;
      items.forEach((it, i) => { it._globalSeq = total - i; });
      return items;
    }

    function applyMetaAndRender() {
      if (Object.keys(metaSnaps).length !== PREFIXES.length) return;
      allItems = buildItemsFromMetaSnaps();
      paginationPage = 1;
      renderTable();
    }

    async function loadMetaOnce() {
      if (!db || !listEl) return;
      const refreshBtn = document.getElementById('listRefreshBtn');
      listEl.innerHTML = '<p class="msg info">4개 프로젝트 데이터 로드 중…</p>';
      if (refreshBtn) refreshBtn.disabled = true;
      metaSnaps = {};
      try {
        for (const prefix of PREFIXES) {
          const snap = await get(dbRef(db, prefix + '/submissions_meta'));
          metaSnaps[prefix] = snap;
        }
        distributionHistoryMap = await loadDistributionHistoryFromFirebase();
        await loadProcessingHistoryFromFirebase();
        applyMetaAndRender();
      } catch (err) {
        listEl.innerHTML = '<p class="msg error">로드 실패: ' + (err.message || err) + '</p>';
      }
      if (refreshBtn) refreshBtn.disabled = false;
    }

    function isCsAccount() {
      return !!(currentUserEmail && ALLOWED_EMAILS.some(e => e.toLowerCase() === currentUserEmail.toLowerCase()));
    }
    function getMyAssignedItems() {
      return allItems.filter((d) => {
        const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
        const history = distributionHistoryMap.get(key) || [];
        if (!Array.isArray(history) || history.length === 0) return false;
        const latest = history[history.length - 1];
        return latest && latest.account && latest.account.toLowerCase() === currentUserEmail.toLowerCase();
      });
    }
    function getMyUnprocessedItems() {
      return getMyAssignedItems().filter((d) => {
        const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
        const ph = processingHistoryMap.get(key) || [];
        return !(ph.length > 0 ? isCallCompleteForKey(ph) : !!d.callComplete);
      });
    }
    function getMyProcessedItems() {
      const email = (currentUserEmail || '').toLowerCase();
      if (!email) return [];
      return getMyAssignedItems().filter((d) => {
        const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
        const ph = processingHistoryMap.get(key) || [];
        const processedBy = getProcessedByAccount(ph);
        return processedBy && processedBy.toLowerCase() === email;
      });
    }

    function getFilteredItems() {
      let base = allItems;
      
      // 아웃바운드 상담원은 본인에게 분배된 건만 보여야 함 (distributionHistoryMap은 Firebase에서 로드/실시간 갱신)
      if (isCsAccount()) {
        base = getMyAssignedItems();
      }

      // processing history 기반 판정 (Firebase에서 로드)
      if (viewFilter !== 'all') {
        if (viewFilter === 'proofError') {
          base = base.filter((d) => !!d.proofError);
        } else if (viewFilter === 'noRefundExchange') {
          base = base.filter((d) => !d.refundDone && !d.exchangeDone);
        } else if (viewFilter === 'noCallComplete') {
          if (isCsAccount()) {
            base = getMyUnprocessedItems();
            // 내가 해야할 일: 푸른 음영(환불·교환 모두 미체크 or 잘못된정보 체크) 또는 붉은 음영(증빙오류 반려)인 건만 표시
            base = base.filter((d) => {
              const isProofError = !!d.proofError;
              const isBlueGroup = (!d.refundDone && !d.exchangeDone) || !!d.invalidInfo;
              return isProofError || isBlueGroup;
            });
          } else {
            base = base.filter((d) => {
              const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
              const ph = processingHistoryMap.get(key) || [];
              const complete = ph.length > 0 ? isCallCompleteForKey(ph) : (!!d.callComplete);
              return !complete;
            });
          }
        } else if (viewFilter === 'callComplete') {
          if (isCsAccount()) {
            base = getMyProcessedItems();
          } else {
            base = base.filter((d) => {
              const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
              const ph = processingHistoryMap.get(key) || [];
              const complete = ph.length > 0 ? isCallCompleteForKey(ph) : (!!d.callComplete);
              return complete;
            });
          }
        } else if (viewFilter === 'finalUnreached') {
          base = base.filter((d) => {
            const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
            const ph = processingHistoryMap.get(key) || [];
            const unreached = ph.length > 0 ? isFinalUnreachedForKey(ph) : (!!d.finalUnreached);
            return unreached;
          });
        } else if (viewFilter === 'postProcessing') {
          base = base.filter((d) => {
            const key = `${d._prefix}_${d._dateKey || ''}_${d.id}`;
            const ph = processingHistoryMap.get(key) || [];
            // processing_history에서 최신 변경 기준으로 확인
            const postProcessing = ph.length > 0 ? isPostProcessingForKey(ph) : (!!d.postProcessing);
            return postProcessing;
          });
        }
      }
      if (!searchFilters.name && !searchFilters.contact && !searchFilters.customsCode && !searchFilters.uniqueCode) return base;
      const nameKeyword = (searchFilters.name || '').trim().toLowerCase();
      const contactKeyword = (searchFilters.contact || '').trim();
      const customsKeyword = (searchFilters.customsCode || '').trim().toUpperCase();
      const uniqueCodeKeyword = (searchFilters.uniqueCode || '').trim();
      return base.filter((d) => {
        let ok = true;
        if (nameKeyword) ok = ok && (d.name || '').toLowerCase().includes(nameKeyword);
        if (contactKeyword) ok = ok && contactMatches(d.contact, searchFilters.contact);
        if (customsKeyword) ok = ok && (getCustomsCodeFromItem(d) || '').toUpperCase().includes(customsKeyword);
        if (uniqueCodeKeyword) {
          const u = getUniqueCodesArray(d);
          const hasMatchingCode = u.some((uc) => {
            const code = (uc.uniqueCode || '').trim();
            return code && code.includes(uniqueCodeKeyword);
          });
          ok = ok && hasMatchingCode;
        }
        return ok;
      });
    }

    const searchUniqueCodeInput = document.getElementById('searchUniqueCode');
    
    if (searchBtn) searchBtn.addEventListener('click', () => {
      searchFilters = {
        name: (searchNameInput && searchNameInput.value) ? searchNameInput.value.trim() : '',
        contact: (searchContactInput && searchContactInput.value) ? searchContactInput.value.trim() : '',
        customsCode: (searchCustomsInput && searchCustomsInput.value) ? searchCustomsInput.value.trim() : '',
        uniqueCode: (searchUniqueCodeInput && searchUniqueCodeInput.value) ? searchUniqueCodeInput.value.trim() : ''
      };

    if (searchResetBtn) searchResetBtn.addEventListener('click', () => {

      if (searchContactInput) searchContactInput.value = '';
      if (searchCustomsInput) searchCustomsInput.value = '';
      if (searchUniqueCodeInput) searchUniqueCodeInput.value = '';

    const listRefreshBtn = document.getElementById('listRefreshBtn');

    function getUniqueCodesArray(d) {
      let arr = d.uniqueCodesData;
      if (Array.isArray(arr)) return arr;
      const codes = Array.isArray(d.uniqueCodes) ? d.uniqueCodes : (d.uniqueCode ? [d.uniqueCode] : []);
      return codes.map(code => ({ productName: '', batchNumber: '', uniqueCode: code || '' }));
    }

    // 처리내역 기록 함수 (Firebase 저장) — 저장 후 즉시 로컬 맵에도 반영
    async function addProcessingHistory(id, dateKey, prefix, changes) {
      if (!db || !currentUserEmail) return;
      const historyPath = prefix + '/processing_history/' + dateKey + '/' + id;
      const historyRef = dbRef(db, historyPath);
      const historyItem = {
        account: currentUserEmail,
        timestamp: Date.now(),
        changes: changes
      };
      try {
        await push(historyRef, historyItem);
        // 저장 직후 로컬 processingHistoryMap에 낙관적 반영 (카운팅 즉시 반영)
        const key = `${prefix}_${dateKey || ''}_${id}`;
        const existing = processingHistoryMap.get(key) || [];
        const merged = [historyItem, ...existing].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        processingHistoryMap.set(key, merged);
      } catch (err) {
        console.error('처리내역 기록 오류:', err);
      }
    }

    // 처리내역 로드 함수 (Firebase에서 로드)
    async function loadProcessingHistory(id, dateKey, prefix) {
      if (!db) return [];
      const historyPath = prefix + '/processing_history/' + dateKey + '/' + id;
      try {
        const snap = await get(dbRef(db, historyPath));
        if (!snap.exists()) return [];
        const history = [];
        snap.forEach((child) => {
          history.push(child.val());
        });
        return history.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      } catch (err) {
        console.error('처리내역 로드 오류:', err);
        return [];
      }
    }

    // 고객별 상담이력 공유 경로 — 통관번호 기준 (몰 달라도 동일 통관번호면 이력 공유)
    const COUNSELING_HISTORY_BY_CUSTOMS_PATH = 'counseling_history_by_customs';
    const COUNSELING_HISTORY_BY_CONTACT_PATH = 'counseling_history_by_contact';

    // 통관번호 정규화 (저장/조회 키 통일, Firebase 키 불가 문자 치환). 몰마다 필드명 다를 수 있음.
    function getCustomsCodeFromItem(d) {
      if (!d) return '';
      return (d.customsCode || d.customs_code || d.customs || d.개인통관부호 || '').trim();
    }
    function canonicalCustomsKey(customsCode) {
      const s = String(customsCode || '').trim().replace(/\s+/g, '').toUpperCase();
      return s.replace(/[.#$\[\]/]/g, '_') || '';
    }

    // 상담이력 로드 — 통관번호 기준 (고객별 공유)
    async function loadCounselingHistoryByCustoms(normalizedCustoms) {
      if (!db || !normalizedCustoms) return [];
      try {
        const snap = await get(dbRef(db, COUNSELING_HISTORY_BY_CUSTOMS_PATH + '/' + normalizedCustoms));
        if (!snap.exists()) return [];
        const val = snap.val();
        if (!val || typeof val !== 'object') return [];
        const arr = [];
        Object.keys(val).forEach((k) => {
          const item = val[k];
          if (item && (item.account != null || item.content != null)) arr.push({ account: item.account || '', timestamp: item.timestamp || 0, content: String(item.content || '') });
        });
        return arr.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      } catch (err) {
        console.error('통관번호 기준 상담이력 로드 오류:', err);
        return [];
      }
    }

    // 상담이력 추가 — 통관번호 기준 (동일 통관번호면 몰 달라도 공유). optionalTimestamp: 통관+연락처 둘 다 쓸 때 같은 값 넘겨서 중복 표시 방지
    async function addCounselingHistoryByCustoms(normalizedCustoms, content, optionalTimestamp) {
      if (!db || !currentUserEmail || !content || !content.trim() || !normalizedCustoms) return;
      try {
        const ts = optionalTimestamp != null ? optionalTimestamp : Date.now();
        const ref = dbRef(db, COUNSELING_HISTORY_BY_CUSTOMS_PATH + '/' + normalizedCustoms);
        await push(ref, { account: currentUserEmail, timestamp: ts, content: content.trim() });
      } catch (err) {
        console.error('통관번호 기준 상담이력 저장 오류:', err);
        const isPermissionDenied = (err && (err.code === 'PERMISSION_DENIED' || err.message && err.message.includes('Permission denied')));
        const wrapped = new Error(isPermissionDenied ? '상담이력 저장 권한이 없습니다. Firebase 콘솔 → Realtime Database → 규칙에서 counseling_history_by_customs 경로에 읽기/쓰기 규칙을 추가한 뒤 게시해 주세요.' : (err.message || '저장 실패'));
        if (isPermissionDenied) wrapped.code = 'PERMISSION_DENIED';
        throw wrapped;
      }
    }

    // 상담이력 로드 — 연락처 기준 (통관번호 없을 때 폴백)
    async function loadCounselingHistoryByContact(normalizedPhone) {
      if (!db || !normalizedPhone) return [];
      try {

        const arr = [];

        });

      } catch (err) {
        console.error('고객별 상담이력 로드 오류:', err);

      }
    }

    async function addCounselingHistoryByContact(normalizedPhone, content, optionalTimestamp) {
      if (!db || !currentUserEmail || !content || !content.trim() || !normalizedPhone) return;
      try {
        const ts = optionalTimestamp != null ? optionalTimestamp : Date.now();

        const wrapped = new Error(isPermissionDenied ? '상담이력 저장 권한이 없습니다. Firebase 콘솔 → Realtime Database → 규칙에서 counseling_history_by_contact 경로에 읽기/쓰기 규칙을 추가한 뒤 게시해 주세요.' : (err.message || '저장 실패'));
        if (isPermissionDenied) wrapped.code = 'PERMISSION_DENIED';

    // 상담이력 로드 — 통관번호·연락처 둘 다 조회 후 병합 (몰 달라도 동일 고객이면 보이도록)
    async function loadCounselingHistoryForDisplay(d) {
      const customsKey = d ? canonicalCustomsKey(getCustomsCodeFromItem(d)) : '';
      const contactKey = d ? canonicalPhoneKeyForHistory(d.contact || '') : '';
      const rawKey = d ? normalizePhone(d.contact || '') : '';
      let byShared = [];
      if (customsKey) byShared = await loadCounselingHistoryByCustoms(customsKey);
      if (contactKey) {
        const byContact = await loadCounselingHistoryByContact(contactKey);
        const seenTs = new Set(byShared.map((h) => h.timestamp));
        byContact.forEach((h) => { if (!seenTs.has(h.timestamp)) { seenTs.add(h.timestamp); byShared.push(h); } });
        if (rawKey && rawKey !== contactKey) {
          const alt = await loadCounselingHistoryByContact(rawKey);
          alt.forEach((h) => { if (!seenTs.has(h.timestamp)) { seenTs.add(h.timestamp); byShared.push(h); } });
        }
        byShared.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      }
      // 연락처만 있고 통관번호 없어도, 같은 연락처인 다른 몰 접수건의 통관번호로 저장된 이력 조회 (이베 반려 후 다른몰 재등록 케이스)
      if (d && Array.isArray(allItems) && !customsKey && contactKey) {
        const sameContactItems = allItems.filter((it) => canonicalPhoneKeyForHistory(it.contact || '') === contactKey || normalizePhone(it.contact || '') === rawKey);
        const customsKeysSeen = new Set();
        for (const it of sameContactItems) {
          const ck = canonicalCustomsKey(getCustomsCodeFromItem(it));
          if (ck && !customsKeysSeen.has(ck)) {
            customsKeysSeen.add(ck);
            const hist = await loadCounselingHistoryByCustoms(ck);
            const seenTs = new Set(byShared.map((h) => h.timestamp));
            hist.forEach((h) => { if (!seenTs.has(h.timestamp)) { seenTs.add(h.timestamp); byShared.push(h); } });
          }
        }
        byShared.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      }
      byShared = byShared.map((h) => ({ ...h, _originLabel: '고객 공유 이력' }));
      const bySubmission = d ? await loadCounselingHistory(d.id, d._dateKey || '', d._prefix || '') : [];
      const bySubmissionTagged = bySubmission.map((h) => ({
        ...h,
        _originLabel: d._globalSeq != null ? '순번 ' + d._globalSeq + ' (현재 접수건)' : '현재 접수건',
        _originSeq: d._globalSeq
      }));
      // 같은 통관번호 또는 같은 연락처 다른 접수건에 건별로만 저장된 이력 수집
      let bySameCustomerSubmissions = [];
      if (d && Array.isArray(allItems)) {
        const sameCustomerItems = allItems.filter((it) => {
          if (it.id === d.id && (it._dateKey || '') === (d._dateKey || '') && it._prefix === d._prefix) return false;
          if (customsKey && canonicalCustomsKey(getCustomsCodeFromItem(it)) === customsKey) return true;
          if (contactKey && (canonicalPhoneKeyForHistory(it.contact || '') === contactKey || normalizePhone(it.contact || '') === rawKey)) return true;
          return false;
        });
        for (const it of sameCustomerItems) {
          const subHist = await loadCounselingHistory(it.id, it._dateKey || '', it._prefix || '');
          const mallName = PROJECT_LABELS[(it._projectIndex || 1) - 1] || it._prefix || '';
          const originLabel = (it._globalSeq != null ? '순번 ' + it._globalSeq + ' ' : '') + (mallName ? mallName + ' ' : '') + '접수건';
          subHist.forEach((h) => bySameCustomerSubmissions.push({ ...h, _originLabel: originLabel.trim(), _originSeq: it._globalSeq }));
        }
      }
      const seen = new Set();
      const merged = [];
      [...byShared, ...bySubmissionTagged, ...bySameCustomerSubmissions].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach((h) => {
        const key = (h.timestamp || 0) + '|' + (h.account || '') + '|' + (h.content || '').slice(0, 50);
        if (seen.has(key)) return;
        seen.add(key);
        merged.push(h);
      });
      return merged;
    }

    // 상담이력 추가 (Firebase submissions/submissions_meta에 저장) — 연락처 없을 때만 사용
    async function addCounselingHistoryToFirebase(id, dateKey, prefix, content, isLegacy) {
      if (!db || !currentUserEmail || !content || !content.trim()) return;
      const subPath = isLegacy ? prefix + '/submissions/' + id : prefix + '/submissions/' + dateKey + '/' + id;
      const metaPath = dateKey ? prefix + '/submissions_meta/' + dateKey + '/' + id : '';
      try {
        const existingHistory = await loadCounselingHistory(id, dateKey, prefix);
        const newHistoryItem = { account: currentUserEmail, timestamp: Date.now(), content: content.trim() };
        const updatedHistory = [...existingHistory, newHistoryItem].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        const historyPayload = { counselingHistory: updatedHistory };
        const subRef = dbRef(db, subPath);
        await update(subRef, historyPayload);
        if (metaPath) {
          const metaRef = dbRef(db, metaPath);
          await update(metaRef, historyPayload);
        }
      } catch (err) {
        console.error('상담이력 저장 오류:', err);
        throw err;
      }
    }

    // 상담이력 로드 함수 (Firebase submissions_meta에서 로드 — 건별, 연락처 없을 때 또는 병합용)
    async function loadCounselingHistory(id, dateKey, prefix) {
      if (!db) return [];
      const metaPath = prefix + '/submissions_meta/' + dateKey + '/' + id;
      try {
        const snap = await get(dbRef(db, metaPath));
        if (!snap.exists()) return [];
        const data = snap.val();
        const hist = data.counselingHistory;
        return Array.isArray(hist) ? hist.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)) : [];
      } catch (err) {
        console.error('상담이력 로드 오류:', err);
        return [];
      }
    }

    let resubmissionToastShownThisSession = false;
    function renderResubmissionBlock(items) {

      if (!items || items.length === 0) {

        block.innerHTML = '';

        html += '<span class="resubmission-item-date">' + formatDate(d.createdAt) + ' ' + proj + '</span>';

      });

    function showResubmissionToast(count) {
      if (count <= 0 || resubmissionToastShownThisSession) return;
      resubmissionToastShownThisSession = true;
      const toast = document.getElementById('resubmissionToast');
      const body = document.getElementById('resubmissionToastBody');
      const btn = document.getElementById('resubmissionToastBtn');
      if (!toast || !body) return;
      body.textContent = '유선안내완료했던 고객의 재접수 ' + count + '건이 있습니다. 아래 목록에서 확인해 주세요.';
      toast.classList.add('show');
      function closeToast() {
        toast.classList.remove('show');
      }
      if (btn) btn.addEventListener('click', closeToast);
      setTimeout(closeToast, 8000);

    function renderTable() {
      const resubmissionItems = getMyResubmissionItems();
      renderResubmissionBlock(resubmissionItems);

      const filteredItems = getFilteredItems();
      if (!filteredItems.length) {
        listEl.innerHTML = '<p class="msg info">' + (allItems.length ? '조건에 맞는 접수가 없습니다.' : '접수된 건이 없습니다.') + '</p>';
        showResubmissionToast(resubmissionItems.length);
        return;
      }
      const total = filteredItems.length;
      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (paginationPage < 1) paginationPage = 1;
      if (paginationPage > totalPages) paginationPage = totalPages;
      const start = (paginationPage - 1) * PAGE_SIZE;
      const pageItems = filteredItems.slice(start, start + PAGE_SIZE);

      const headerRow =
        '<th class="cell-seq">순번</th>' +
        '<th class="cell-project">접수경로</th>' +
        '<th>이름</th><th>연락처</th><th>접수일시</th>' +
        '<th>상세</th>';

      let rowsHtml = '';
      pageItems.forEach((d) => {
        const seq = d._globalSeq;
        const proj = PROJECT_LABELS[d._projectIndex - 1] || '';
        const prefix = d._prefix;
        const dateKey = d._dateKey || '';
        const isLegacy = !!d._isLegacy;
        const isProofError = !!d.proofError;
        const isBlueGroup = (!d.refundDone && !d.exchangeDone) || !!d.invalidInfo;
        const rowClass = isProofError ? 'row-proof-error' : (isBlueGroup ? 'row-no-check' : '');

        rowsHtml += '<tr class="' + rowClass + '" data-id="' + escapeAttr(d.id) + '" data-date-key="' + escapeAttr(dateKey) + '" data-legacy="' + (isLegacy ? '1' : '0') + '" data-prefix="' + escapeAttr(prefix) + '" data-project-index="' + d._projectIndex + '">';
        rowsHtml += '<td class="cell-seq">' + seq + '</td>';
        rowsHtml += '<td class="cell-project">' + proj + '</td>';
        rowsHtml += '<td><span class="cell-text">' + escapeHtml(d.name || '-') + '</span></td>';
        rowsHtml += '<td><span class="cell-text">' + escapeHtml(d.contact || '-') + '</span></td>';
        rowsHtml += '<td>' + formatDate(d.createdAt) + '</td>';
        rowsHtml += '<td><button type="button" class="btn btn-primary detail-modal-btn" style="font-size:11px;padding:2px 6px;">상세</button></td>';
        rowsHtml += '</tr>';

    async function refreshCounselingHistoryList(d) {
      const historyListEl = document.getElementById('counselingModalHistoryList');

        historyListEl.innerHTML = '';
        return;

    function closeCounselingModal() {
      const modal = document.getElementById('counselingModal');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    function attachCounselingModalListeners(d) {
      const closeBtn = document.getElementById('counselingModalClose');
      const cancelBtn = document.getElementById('counselingModalCancelBtn');
      const saveBtn = document.getElementById('counselingModalSaveBtn');
      const modal = document.getElementById('counselingModal');
      const textareaEl = document.getElementById('counselingModalTextarea');
      
      // 기존 리스너 제거 (중복 방지)
      const newCloseBtn = closeBtn.cloneNode(true);
      closeBtn.parentNode.replaceChild(newCloseBtn, closeBtn);
      const newCancelBtn = cancelBtn.cloneNode(true);
      cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
      const newSaveBtn = saveBtn.cloneNode(true);
      saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
      
      document.getElementById('counselingModalClose').addEventListener('click', closeCounselingModal);
      document.getElementById('counselingModalCancelBtn').addEventListener('click', closeCounselingModal);
      document.getElementById('counselingModalSaveBtn').addEventListener('click', async () => {
        const counselingContent = textareaEl.value || '';
        if (!counselingContent.trim()) {
          alert('상담이력을 입력해주세요.');
          return;
        }
        const id = d.id;
        const dateKey = (d._dateKey || '').trim();
        const isLegacy = !!d._isLegacy;
        const prefix = (d._prefix || '').trim();
        if (!id || !prefix) return;
        if (!isLegacy && !dateKey) return;
        
        try {
          const customsKey = canonicalCustomsKey(getCustomsCodeFromItem(d));
          const contactKey = canonicalPhoneKeyForHistory(d.contact || '');
          const oneTs = Date.now();
          if (customsKey) await addCounselingHistoryByCustoms(customsKey, counselingContent, oneTs);
          if (contactKey) await addCounselingHistoryByContact(contactKey, counselingContent, oneTs);
          if (!customsKey && !contactKey) await addCounselingHistoryToFirebase(id, dateKey, prefix, counselingContent, isLegacy);
          await addProcessingHistory(id, dateKey, prefix, '상담이력 기재');
          await loadProcessingHistoryFromFirebase();
          alert('상담이력이 저장되었습니다.' + (customsKey || contactKey ? ' (통관번호/연락처 기준·몰 관계없이 공유)' : ''));
          closeCounselingModal();
          renderTable();
          textareaEl.value = '';
          await refreshCounselingHistoryList(d);
          textareaEl.focus();
        } catch (err) {
          console.error('저장 오류:', err);
          alert('저장 실패: ' + (err.message || err));
        }
      });
      
      // 모달 배경 클릭 시 닫기
      if (modal) {
        const handleBackgroundClick = (e) => {
          if (e.target === modal) {
            closeCounselingModal();
          }
        };
        modal.removeEventListener('click', handleBackgroundClick);
        modal.addEventListener('click', handleBackgroundClick);
      }
    }

    function getPhotoListFromData(d, singleKey, listKey) {
      if (!d) return [];
      if (Array.isArray(d[listKey])) return d[listKey];
      const single = d[singleKey];
      return single ? [single] : [];
    }

          return;

        const data = snap.val();
        const p1List = getPhotoListFromData(data, 'photo1', 'photo1List');
        const p2List = getPhotoListFromData(data, 'photo2', 'photo2List');

        else html += '<div class="no-image">없음</div>';
        html += '</div><div class="detail-modal-photo-box"><h3>2. 제품 앞면</h3><div class="caption">업로드된 사진 (클릭 시 확대)</div>';
        if (p2List.length) p2List.forEach((url) => { html += '<img src="' + url.replace(/"/g, '&quot;') + '" alt="제품 앞면" class="detail-modal-photo-img" data-url="' + url.replace(/"/g, '&quot;') + '">'; });
        else html += '<div class="no-image">없음</div>';
        html += '</div><div class="detail-modal-photo-box"><h3>3. 제품 뒷면/바닥면</h3><div class="caption">업로드된 사진 (클릭 시 확대)</div>';
