        container.innerHTML = html;

        initPhotoZoomOverlay(allPhotos);
      }).catch(() => { container.innerHTML = '<p class="no-image">사진을 불러올 수 없습니다.</p>'; });
    }

    let _photoZoomState = null;
    function initPhotoZoomOverlay(allPhotos) {
      const overlay = document.getElementById('photoZoomOverlay');
      const zoomImg = document.getElementById('photoZoomImg');
      const closeBtn = document.getElementById('photoZoomClose');
      const prevBtn = document.getElementById('photoZoomPrev');
      const nextBtn = document.getElementById('photoZoomNext');
      const counter = document.getElementById('photoZoomCounter');
      const hint = document.getElementById('photoZoomHint');
      if (!overlay || !zoomImg) return;

      _photoZoomState = {
        allPhotos,
        currentPhotoIndex: -1,
        zoomLevel: 1.0,
        translateX: 0,
        translateY: 0,
        isDragging: false,
        dragStartX: 0, dragStartY: 0, dragStartTranslateX: 0, dragStartTranslateY: 0,
        minZoom: 1.0, maxZoom: 5.0, zoomStep: 0.1
      };

      const constrainPosition = () => {
        const s = _photoZoomState;
        if (!s || s.zoomLevel <= 1.0) { if (s) { s.translateX = 0; s.translateY = 0; } return; }
        const imgRect = zoomImg.getBoundingClientRect();
        const overlayRect = overlay.getBoundingClientRect();
        const imgDisplayWidth = imgRect.width / s.zoomLevel;
        const imgDisplayHeight = imgRect.height / s.zoomLevel;
        const scaledWidth = imgDisplayWidth * s.zoomLevel, scaledHeight = imgDisplayHeight * s.zoomLevel;
        const maxX = Math.max(0, (scaledWidth - overlayRect.width) / 2);
        const maxY = Math.max(0, (scaledHeight - overlayRect.height) / 2);
        s.translateX = Math.max(-maxX, Math.min(maxX, s.translateX));
        s.translateY = Math.max(-maxY, Math.min(maxY, s.translateY));
      };
      const applyTransform = () => {
        const s = _photoZoomState;
        if (!s) return;
        zoomImg.style.transform = `translate(${s.translateX}px, ${s.translateY}px) scale(${s.zoomLevel})`;
        zoomImg.classList.toggle('zoomed', s.zoomLevel > 1.0);
      };
      const zoomIn = () => {
        const s = _photoZoomState;
        if (!s) return;
        const oldZoom = s.zoomLevel;
        s.zoomLevel = Math.min(s.zoomLevel + s.zoomStep, s.maxZoom);
        const zoomRatio = s.zoomLevel / oldZoom;
        s.translateX *= zoomRatio; s.translateY *= zoomRatio;
        constrainPosition(); applyTransform();
      };
      const zoomOut = () => {
        const s = _photoZoomState;
        if (!s) return;
        const oldZoom = s.zoomLevel;
        s.zoomLevel = Math.max(s.zoomLevel - s.zoomStep, s.minZoom);
        const zoomRatio = s.zoomLevel / oldZoom;
        s.translateX *= zoomRatio; s.translateY *= zoomRatio;
        constrainPosition(); applyTransform();
      };
      const resetZoom = () => {
        const s = _photoZoomState;
        if (s) { s.zoomLevel = 1.0; s.translateX = 0; s.translateY = 0; }
        applyTransform();
      };
      const showZoom = (index) => {
        const s = _photoZoomState;
        if (!s || index < 0 || index >= s.allPhotos.length) return;
        s.currentPhotoIndex = index;
        resetZoom();
        zoomImg.src = s.allPhotos[index].url;
        counter.textContent = (index + 1) + ' / ' + s.allPhotos.length;
        prevBtn.classList.toggle('disabled', s.currentPhotoIndex <= 0);
        nextBtn.classList.toggle('disabled', s.currentPhotoIndex >= s.allPhotos.length - 1);
        overlay.classList.add('show');
        hint.classList.remove('hidden');
        setTimeout(() => hint.classList.add('hidden'), 5000);
      };
      const hideZoom = () => {
        overlay.classList.remove('show');
        zoomImg.src = '';
        resetZoom();
        if (_photoZoomState) _photoZoomState.currentPhotoIndex = -1;
      };
      const showPrev = () => { const s = _photoZoomState; if (s && s.currentPhotoIndex > 0) showZoom(s.currentPhotoIndex - 1); };
      const showNext = () => { const s = _photoZoomState; if (s && s.currentPhotoIndex < s.allPhotos.length - 1) showZoom(s.currentPhotoIndex + 1); };

      if (!overlay.dataset.photoZoomInited) {
        overlay.dataset.photoZoomInited = '1';
        overlay.onclick = (e) => { if (e.target === overlay || e.target === closeBtn) hideZoom(); };
        prevBtn.onclick = (e) => { e.stopPropagation(); if (!prevBtn.classList.contains('disabled')) showPrev(); };
        nextBtn.onclick = (e) => { e.stopPropagation(); if (!nextBtn.classList.contains('disabled')) showNext(); };
        document.addEventListener('keydown', (e) => {
          if (!overlay.classList.contains('show') || !_photoZoomState) return;
          if (e.key === 'ArrowLeft') { e.preventDefault(); showPrev(); }
          else if (e.key === 'ArrowRight') { e.preventDefault(); showNext(); }
          else if (e.key === 'Escape') { e.preventDefault(); hideZoom(); }
          else if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
          else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoomOut(); }
          else if (e.key === '0') { e.preventDefault(); resetZoom(); }
        });
        overlay.addEventListener('wheel', (e) => {
          const s = _photoZoomState;
          if (!overlay.classList.contains('show') || !s) return;
          e.preventDefault();
          if (e.ctrlKey || e.metaKey) {
            if (e.deltaY < 0) zoomIn(); else zoomOut();
          } else if (s.zoomLevel > 1.0) {
            s.translateX -= e.deltaX * 2; s.translateY -= e.deltaY * 2;
            constrainPosition(); applyTransform();
          }
        }, { passive: false });
        zoomImg.onmousedown = (e) => {
          const s = _photoZoomState;
          if (!s || s.zoomLevel <= 1.0) return;
          s.isDragging = true;
          s.dragStartX = e.clientX; s.dragStartY = e.clientY;
          s.dragStartTranslateX = s.translateX; s.dragStartTranslateY = s.translateY;
          zoomImg.style.cursor = 'grabbing';
        };
        document.addEventListener('mousemove', (e) => {
          const s = _photoZoomState;
          if (!s || !s.isDragging || !overlay.classList.contains('show')) return;
          s.translateX = s.dragStartTranslateX + (e.clientX - s.dragStartX);
          s.translateY = s.dragStartTranslateY + (e.clientY - s.dragStartY);
          constrainPosition(); applyTransform();
        });
        document.addEventListener('mouseup', () => {
          const s = _photoZoomState;
          if (s && s.isDragging) {
            s.isDragging = false;
            if (s.zoomLevel > 1.0) zoomImg.style.cursor = 'move';
          }
        });
      }

      document.getElementById('detailModalPhotos').querySelectorAll('.detail-modal-photo-img').forEach((img) => {
        img.onclick = () => {
          const url = img.getAttribute('data-url');
          if (!url || !_photoZoomState) return;
          const idx = _photoZoomState.allPhotos.findIndex(p => p.url === url);
          if (idx >= 0) showZoom(idx);
        };
      });
    }

    function attachDetailModalCheckboxListeners() {
      const flagsEl = document.getElementById('detailModalFlags');
      if (!flagsEl) return;
      const cbRefund = document.getElementById('dm-cb-refund');
      const cbExchange = document.getElementById('dm-cb-exchange');
      const cbInvalid = document.getElementById('dm-cb-invalid');
      const cbCallComplete = document.getElementById('dm-cb-callComplete');
      const cbFinalUnreached = document.getElementById('dm-cb-finalUnreached');
      const cbPostProcessing = document.getElementById('dm-cb-postProcessing');
      const saveHistoryBtn = document.getElementById('dm-save-history-btn');
      
      const saveFromModal = async () => {
        const refundDone = !!cbRefund?.checked;
        const exchangeDone = !!cbExchange?.checked;
        const invalidInfo = !!cbInvalid?.checked;
        const callComplete = !!cbCallComplete?.checked;
        const finalUnreached = !!cbFinalUnreached?.checked;
        const postProcessing = !!cbPostProcessing?.checked;
        
        // 고객 정보 필드 읽기
        const customerName = (document.getElementById('dm-customer-name')?.value || '').trim();
        const customerContact = (document.getElementById('dm-customer-contact')?.value || '').trim();
        const customerAddress = (document.getElementById('dm-customer-address')?.value || '').trim();
        const customerCustoms = (document.getElementById('dm-customer-customs')?.value || '').trim();
        const customerBank = (document.getElementById('dm-customer-bank')?.value || '').trim();
        const customerAccount = (document.getElementById('dm-customer-account')?.value || '').trim();
        const customerAccountName = (document.getElementById('dm-customer-account-name')?.value || '').trim();
        
        const d = currentDetailData;
        if (!d || !db) return;
        const id = d.id;
        const dateKey = (d._dateKey || '').trim();
        const isLegacy = !!d._isLegacy;
        const prefix = (d._prefix || '').trim();
        if (!id || !prefix) return;
        if (!isLegacy && !dateKey) return;
        
        const oldValues = {
          refundDone: d.refundDone || false,
          exchangeDone: d.exchangeDone || false,
          invalidInfo: d.invalidInfo || false,
          callComplete: (d._effectiveCallComplete !== undefined ? d._effectiveCallComplete : d.callComplete) || false,
          finalUnreached: (d._effectiveFinalUnreached !== undefined ? d._effectiveFinalUnreached : d.finalUnreached) || false,
          postProcessing: (d._effectivePostProcessing !== undefined ? d._effectivePostProcessing : d.postProcessing) || false,
          name: d.name || '',
          contact: d.contact || '',
          address: d.address || '',
          addressDetail: d.addressDetail || '',
          customsCode: getCustomsCodeFromItem(d) || '',
          bankName: d.bankName || '',
          bankAccountNumber: d.bankAccountNumber || '',
          bankAccountName: d.bankAccountName || ''
        };
        
        const newValues = { refundDone, exchangeDone, invalidInfo, callComplete, finalUnreached, postProcessing };
        const customerChanges = {};
        const changes = [];
        
        // 고객 정보 변경사항 확인
        if (oldValues.name !== customerName) {
          newValues.name = customerName;
          customerChanges.name = customerName;
        }
        if (oldValues.contact !== customerContact) {
          newValues.contact = customerContact;
          customerChanges.contact = customerContact;
        }
        // 주소는 전체를 address에 저장하고, addressDetail은 빈 문자열로 설정 (단순화)
        // 필요시 나중에 주소 파싱 로직 추가 가능
        const trimmedAddress = customerAddress.trim();
        if (oldValues.address !== trimmedAddress || oldValues.addressDetail !== '') {
          newValues.address = trimmedAddress;
          newValues.addressDetail = '';
          customerChanges.address = trimmedAddress;
          customerChanges.addressDetail = '';
        }
        if (oldValues.customsCode !== customerCustoms) {
          newValues.customsCode = customerCustoms;
          customerChanges.customsCode = customerCustoms;
        }
        if (oldValues.bankName !== customerBank) {
          newValues.bankName = customerBank;
          customerChanges.bankName = customerBank;
        }
        if (oldValues.bankAccountNumber !== customerAccount) {
          newValues.bankAccountNumber = customerAccount;
          customerChanges.bankAccountNumber = customerAccount;
        }
        if (oldValues.bankAccountName !== customerAccountName) {
          newValues.bankAccountName = customerAccountName;
          customerChanges.bankAccountName = customerAccountName;
        }
        
        // 체크박스 변경사항 확인
        if (oldValues.refundDone !== newValues.refundDone) changes.push('환불: ' + (newValues.refundDone ? '체크' : '해제'));
        if (oldValues.exchangeDone !== newValues.exchangeDone) changes.push('교환: ' + (newValues.exchangeDone ? '체크' : '해제'));
        if (oldValues.invalidInfo !== newValues.invalidInfo) changes.push('잘못된정보: ' + (newValues.invalidInfo ? '체크' : '해제'));
        if (oldValues.callComplete !== newValues.callComplete) changes.push('유선안내완료: ' + (newValues.callComplete ? '체크' : '해제'));
        if (oldValues.finalUnreached !== newValues.finalUnreached) changes.push('최종미연결: ' + (newValues.finalUnreached ? '체크' : '해제'));
        if (oldValues.postProcessing !== newValues.postProcessing) changes.push('후처리관리중: ' + (newValues.postProcessing ? '체크' : '해제'));
        
        // 고객 정보 변경사항 기록
        const customerChangeList = [];
        if (customerChanges.name !== undefined) customerChangeList.push('이름 수정');
        if (customerChanges.contact !== undefined) customerChangeList.push('연락처 수정');
        if (customerChanges.address !== undefined || customerChanges.addressDetail !== undefined) customerChangeList.push('주소 수정');
        if (customerChanges.customsCode !== undefined) customerChangeList.push('개인통관부호 수정');
        if (customerChanges.bankName !== undefined) customerChangeList.push('은행 수정');
        if (customerChanges.bankAccountNumber !== undefined) customerChangeList.push('계좌번호 수정');
        if (customerChanges.bankAccountName !== undefined) customerChangeList.push('계좌명 수정');
        if (customerChangeList.length > 0) {
          changes.push('고객정보: ' + customerChangeList.join(', '));
        }
        
        const subPath = isLegacy ? prefix + '/submissions/' + id : prefix + '/submissions/' + dateKey + '/' + id;
        const metaPath = dateKey ? (prefix + '/submissions_meta/' + dateKey + '/' + id) : '';
        
        // 아웃바운드 상담원은 배정된 건의 모든 체크박스 수정 가능
        // (환불완료/교환완료 건도 수정 가능)
        
        try {
          await update(dbRef(db, subPath), newValues);
          if (metaPath) await update(dbRef(db, metaPath), newValues);
          
          if (changes.length > 0) {
            await addProcessingHistory(id, dateKey, prefix, changes.join(', '));
          }
          
          const it = allItems.find((i) => String(i.id) === String(id) && (i._dateKey || '') === dateKey && i._prefix === prefix);
          if (it) {
            it.refundDone = newValues.refundDone;
            it.exchangeDone = newValues.exchangeDone;
            it.invalidInfo = newValues.invalidInfo;
            it.sixCansOrMore = newValues.sixCansOrMore;
            it.callComplete = newValues.callComplete;
            it.finalUnreached = newValues.finalUnreached;
            it.postProcessing = newValues.postProcessing;
            // 고객 정보도 업데이트
            if (newValues.name !== undefined) it.name = newValues.name;
            if (newValues.contact !== undefined) it.contact = newValues.contact;
            if (newValues.address !== undefined) it.address = newValues.address;
            if (newValues.addressDetail !== undefined) it.addressDetail = newValues.addressDetail;
            if (newValues.customsCode !== undefined) it.customsCode = newValues.customsCode;
            if (newValues.bankName !== undefined) it.bankName = newValues.bankName;
            if (newValues.bankAccountNumber !== undefined) it.bankAccountNumber = newValues.bankAccountNumber;
            if (newValues.bankAccountName !== undefined) it.bankAccountName = newValues.bankAccountName;
          }
          
          await loadProcessingHistoryFromFirebase();
          alert('저장되었습니다.');
          closeDetailModal();
          renderTable();
        } catch (err) {
          console.error('저장 오류:', err);
          alert('저장 실패: ' + (err.message || err));
        }
      };
      
      const applyBtn = document.getElementById('dm-apply-flags-btn');
      if (applyBtn) applyBtn.addEventListener('click', saveFromModal);

      const saveProductsBtn = document.getElementById('dm-save-products-btn');
      if (saveProductsBtn) {
        saveProductsBtn.addEventListener('click', async () => {
          const d = currentDetailData;
          if (!d || !db) return;
          const products = getUniqueCodesArray(d);
          const updated = products.map((p, idx) => {
            const batchIn = document.querySelector('.dm-product-batch[data-idx="' + idx + '"]');
            const uniqueIn = document.querySelector('.dm-product-unique[data-idx="' + idx + '"]');
            return {
              productName: p.productName || '',
              batchNumber: (batchIn && batchIn.value) ? batchIn.value.trim() : (p.batchNumber || ''),
              uniqueCode: (uniqueIn && uniqueIn.value) ? uniqueIn.value.trim() : (p.uniqueCode || '')
            };
          });
          const id = d.id;
          const dateKey = (d._dateKey || '').trim();
          const isLegacy = !!d._isLegacy;
          const prefix = (d._prefix || '').trim();
          if (!id || !prefix || (!isLegacy && !dateKey)) return;
          const subPath = isLegacy ? prefix + '/submissions/' + id : prefix + '/submissions/' + dateKey + '/' + id;
          const metaPath = dateKey ? (prefix + '/submissions_meta/' + dateKey + '/' + id) : '';
          try {
            await update(dbRef(db, subPath), { uniqueCodesData: updated });
            if (metaPath) await update(dbRef(db, metaPath), { uniqueCodesData: updated });
            const it = allItems.find((i) => String(i.id) === String(id) && (i._dateKey || '') === dateKey && i._prefix === prefix);
            if (it) it.uniqueCodesData = updated;
            await addProcessingHistory(id, dateKey, prefix, '고유번호·제조번호 재등록');
            alert('고유번호·제조번호가 저장되었습니다.');
            closeDetailModal();
            renderTable();
          } catch (err) {
            console.error('저장 오류:', err);
            alert('저장 실패: ' + (err.message || err));
          }
        });
      }
      
      if (saveHistoryBtn) {
        saveHistoryBtn.addEventListener('click', async () => {
          const content = (document.getElementById('dm-counseling-history')?.value || '').trim();
          const d = currentDetailData;
          if (!d || !db) return;
          if (!content) {
            alert('상담이력을 입력해주세요.');
            return;
          }
          const id = d.id;
          const dateKey = (d._dateKey || '').trim();
          const prefix = (d._prefix || '').trim();
          if (!id || !prefix) return;
          if (!d._isLegacy && !dateKey) return;

          const customsKey = canonicalCustomsKey(getCustomsCodeFromItem(d));
          const contactKey = canonicalPhoneKeyForHistory(d.contact || '');
          const oneTs = Date.now();
          if (customsKey) await addCounselingHistoryByCustoms(customsKey, content, oneTs);
          if (contactKey) await addCounselingHistoryByContact(contactKey, content, oneTs);
          if (!customsKey && !contactKey) await addCounselingHistoryToFirebase(id, dateKey, prefix, content, !!d._isLegacy);
          await addProcessingHistory(id, dateKey, prefix, '상담이력 기재');

          const listEl = document.getElementById('dm-counseling-history-list');
          if (listEl) {
            const history = await loadCounselingHistoryForDisplay(d);
            let html = '';
            if (history.length > 0) {
              history.forEach((h) => {
                html += '<div class="counseling-history-item">';
                html += '<div style="font-size:11px;color:#666;margin-bottom:4px;"><strong>' + formatDate(h.timestamp) + '</strong> ' + escapeHtml(h.account);
                if (h._originLabel) html += ' <span style="margin-left:6px;font-size:10px;color:#888;background:#eee;padding:2px 6px;border-radius:4px;">' + escapeHtml(h._originLabel) + '</span>';
                html += '</div><div style="font-size:13px;white-space:pre-wrap;">' + escapeHtml(h.content) + '</div></div>';
              });
            } else {
              html = '<div style="font-size:12px;color:#999;">등록된 상담이력이 없습니다.</div>';
            }
            listEl.innerHTML = html;
          }
          document.getElementById('dm-counseling-history').value = '';
          alert('상담이력이 저장되었습니다.');
        });
      }
    }

    (function initDetailModalClose() {
      const modal = document.getElementById('detailModal');
      const closeBtn = document.getElementById('detailModalClose');
      if (closeBtn) closeBtn.addEventListener('click', closeDetailModal);
      if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) closeDetailModal(); });
    })();
  </script>
