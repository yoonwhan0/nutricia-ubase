<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사진 보기 - 압타밀 통합 조회</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { padding: 20px; max-width: 1600px; margin: 0 auto; background: #f5f5f5; }
    .detail-page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .detail-page-header h1 { margin: 0; font-size: 1.25rem; }
    .back-link { padding: 8px 16px; background: #1a1a1a; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; }
    .back-link:hover { background: #333; color: #fff; }
    #detailRoot { background: #fff; padding: 24px; border-radius: 8px; border: 1px solid #e0e0e0; display: flex; gap: 24px; }
    .photo-column { flex: 1; min-width: 0; }
    .info-column { flex: 0 0 400px; }
    .detail-section { margin-bottom: 24px; }
    .detail-section h2 { font-size: 16px; margin: 0 0 12px 0; border-bottom: 1px solid #e0e0e0; padding-bottom: 8px; }
    .info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
    .info-item { display: flex; flex-direction: column; }
    .info-item label { font-weight: 600; color: #666; font-size: 12px; margin-bottom: 4px; }
    .info-item span { color: #333; font-size: 14px; }
    .product-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .product-item { border: 1px solid #e0e0e0; padding: 12px; border-radius: 4px; background: #fafafa; }
    .product-item .product-name { font-weight: 600; color: #333; margin-bottom: 8px; }
    .product-item .product-detail { font-size: 13px; color: #666; margin: 4px 0; }
    .detail-photos { display: flex; flex-direction: column; gap: 16px; }
    .photo-box { border: 1px solid #e0e0e0; padding: 12px; border-radius: 4px; }
    .photo-box .caption { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: 600; }
    .photo-box-images { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-photo-img { max-width: 300px; max-height: 300px; cursor: pointer; display: block; border-radius: 4px; object-fit: contain; }
    .no-image { color: #999; font-size: 13px; }
    .msg.error { color: #c00; }
    .photo-zoom-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); z-index: 10000; display: none; align-items: center; justify-content: center; cursor: default; }
    .photo-zoom-overlay.show { display: flex; }
    .photo-zoom-img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; cursor: zoom-in; transition: transform 0.1s ease-out; transform-origin: center center; }
    .photo-zoom-img.zoomed { cursor: move; }
    .photo-zoom-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 32px; font-weight: bold; cursor: pointer; background: rgba(0, 0, 0, 0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 10001; }
    .photo-zoom-close:hover { background: rgba(0, 0, 0, 0.8); }
    .photo-zoom-nav { position: absolute; top: 50%; transform: translateY(-50%); color: #fff; font-size: 48px; font-weight: bold; cursor: pointer; background: rgba(0, 0, 0, 0.5); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 10001; transition: background 0.2s; border: none; }
    .photo-zoom-nav:hover { background: rgba(0, 0, 0, 0.8); }
    .photo-zoom-nav.prev { left: 20px; }
    .photo-zoom-nav.next { right: 20px; }
    .photo-zoom-nav.disabled { opacity: 0.3; cursor: not-allowed; }
    .photo-zoom-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; background: rgba(0, 0, 0, 0.5); padding: 8px 16px; border-radius: 20px; z-index: 10001; }
    .photo-zoom-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 12px; background: rgba(0, 0, 0, 0.7); padding: 8px 16px; border-radius: 20px; z-index: 10001; text-align: center; line-height: 1.5; }
    .photo-zoom-hint.hidden { display: none; }
    .ai-review-block { background: #1a1a1a; color: #fff; padding: 14px; border-radius: 6px; margin-top: 8px; }
    .ai-review-block .info-item label { color: #b0b0b0; }
    .ai-review-block .info-item span { color: #fff; }
    .ai-review-block .ai-opinion-box { margin-top: 8px; padding: 10px; background: rgba(255,255,255,0.08); border-radius: 4px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; max-height: 200px; overflow-y: auto; color: #fff; }
    @media (max-width: 1024px) {
      #detailRoot { flex-direction: column; }
      .info-column { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="detail-page-header">
    <h1 id="detailPageTitle">사진 보기</h1>
    <a href="#" id="backToListBtn" class="back-link">← 목록으로</a>
  </div>
  <div id="detailRoot">불러오는 중…</div>
  <div id="photoZoomOverlay" class="photo-zoom-overlay">
    <span class="photo-zoom-close">&times;</span>
    <div class="photo-zoom-hint" id="photoZoomHint">Ctrl + 휠: 확대/축소 | 휠: 스크롤 이동 | ←/→: 사진 전환</div>
    <button class="photo-zoom-nav prev" id="photoZoomPrev">‹</button>
    <button class="photo-zoom-nav next" id="photoZoomNext">›</button>
    <img id="photoZoomImg" class="photo-zoom-img" src="" alt="확대 사진">
    <div class="photo-zoom-counter" id="photoZoomCounter"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref as dbRef, get, child } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCxNwnAzMn0JUkHGDXgY4taTPJYeABDohg",
      authDomain: "eibe-nutricia.firebaseapp.com",
      databaseURL: "https://eibe-nutricia-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "eibe-nutricia",
      storageBucket: "eibe-nutricia.firebasestorage.app",
      messagingSenderId: "605906618980",
      appId: "1:605906618980:web:d947540696a573c4856d71"
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';
    const dateKey = params.get('dateKey') || '';
    const isLegacy = params.get('legacy') === '1' || params.get('legacy') === 'true';
    const prefix = params.get('prefix') || 'nutricia-x9fQ2kM7-1';

    let app, db;
    try {
      app = initializeApp(firebaseConfig);
      db = getDatabase(app);
    } catch (err) {
      document.getElementById('detailRoot').innerHTML = '<p class="msg error">Firebase 초기화에 실패했습니다.</p>';
      throw err;
    }

    document.getElementById('backToListBtn').addEventListener('click', (e) => {
      e.preventDefault();
      if (window.opener) window.close();
      else window.location.href = 'index.html';
    });

    function getPhotoListFromData(d, singleKey, listKey) {
      if (!d) return [];
      if (Array.isArray(d[listKey])) return d[listKey];
      const single = d[singleKey];
      return single ? [single] : [];
    }

    function getProductBatchNumbersForPrefix(prefix, productName) {
      if (!productName) return [];
      const name = productName.replace(/\s+/g, '');
      
      // 1사이트 (nutricia-x9fQ2kM7-1)
      if (prefix === 'nutricia-x9fQ2kM7-1') {
        if (name.includes('프로푸트라듀오어드밴스_PRE프레') || name.includes('프로푸트라듀오어드밴스PRE프레')) {
          return ['17-12-2026', '15-03-2027', '22-04-2027', '01-06-2027', '22-07-2027', '07-09-2027', '15-09-2027'];
        }
        if (name.includes('프로푸트라듀오어드밴스_1단계') || name.includes('프로푸트라듀오어드밴스1단계')) {
          return ['21-04-2027', '01-06-2027', '21-07-2027', '07-09-2027', '16-09-2027'];
        }
        if (name.includes('프로푸트라듀오어드밴스_2단계') || name.includes('프로푸트라듀오어드밴스2단계')) {
          return ['19-01-2027', '16-02-2027', '17-04-2027', '06-06-2027', '27-06-2027', '20-07-2027'];
        }
        if (name.includes('프로누트라어드밴스HMO800g_1단계') || name.includes('프로누트라어드밴스HMO800g1단계')) {
          return ['01-11-2026', '27-11-2026'];
        }
        if (name.includes('프로누트라어드밴스HMO800g_3단계') || name.includes('프로누트라어드밴스HMO800g3단계')) {
          return ['18-07-2026', '10-09-2026', '25-10-2026', '29-11-2026', '18-02-2027'];
        }
        if (name.includes('탭스_1단계') || name.includes('탭스1단계')) {
          return ['02-08-2026', '03-08-2026', '07-08-2026', '08-08-2026', '07-10-2026', '08-10-2026', '10-10-2026', '28-10-2026', '25-11-2026', '04-03-2027', '05-03-2027', '21-03-2027', '22-03-2027', '23-03-2027'];
        }
        if (name.includes('탭스_2단계') || name.includes('탭스2단계')) {
          return ['24-07-2026', '25-07-2026', '27-07-2026', '29-09-2026', '30-09-2026', '01-10-2026', '02-10-2026', '03-10-2026', '01-11-2026', '02-11-2026', '20-12-2026', '01-03-2027'];
        }
        if (name.includes('한국공식') && (name.includes('프로누트라어드밴스HMO800g_2단계') || name.includes('프로누트라어드밴스HMO800g2단계'))) {
          return ['2026-08-14', '2026-10-02', '2026-11-02', '2026-12-09', '2027-03-06'];
        }
      }
      
      // 2사이트 (nutricia-aL4pZ8Tq-2)
      if (prefix === 'nutricia-aL4pZ8Tq-2') {
        if (name.includes('프로푸트라듀오어드밴스_PRE프레') || name.includes('프로푸트라듀오어드밴스PRE프레')) {
          return ['20-02-2027', '15-03-2027', '22-07-2027'];
        }
        if (name.includes('프로푸트라듀오어드밴스_1단계') || name.includes('프로푸트라듀오어드밴스1단계')) {
          return ['21-02-2027', '19-03-2027', '01-06-2027', '21-07-2027', '07-09-2027', '21-11-2027'];
        }
        if (name.includes('프로푸트라듀오어드밴스_2단계') || name.includes('프로푸트라듀오어드밴스2단계')) {
          return ['19-01-2027', '16-02-2027', '17-04-2027', '27-06-2027', '20-07-2027'];
        }
        if (name.includes('프로누트라어드밴스HMO800g_2단계') || name.includes('프로누트라어드밴스HMO800g2단계')) {
          return ['08-09-2026'];
        }
        if (name.includes('탭스_1단계') || name.includes('탭스1단계')) {
          return ['02-08-2026', '19-01-2027', '28-01-2027', '05-03-2027', '21-03-2027'];
        }
        if (name.includes('탭스_2단계') || name.includes('탭스2단계')) {
          return ['30-09-2026', '20-01-2027', '21-01-2027'];
        }
      }
      
      // 3사이트 (nutricia-nu7VnCwR3H-3)
      if (prefix === 'nutricia-nu7VnCwR3H-3') {
        if (name.includes('프로푸트라듀오어드밴스_1단계') || name.includes('프로푸트라듀오어드밴스1단계')) {
          return ['21-11-2027'];
        }
      }
      
      // 4사이트 (nutricia-MK2rP9dS-4)
      if (prefix === 'nutricia-MK2rP9dS-4') {
        if (name.includes('프로푸트라듀오어드밴스_PRE프레') || name.includes('프로푸트라듀오어드밴스PRE프레')) {
          return ['17-12-2026', '20-02-2027', '15-03-2027', '22-04-2027', '01-06-2027', '15-09-2027'];
        }
        if (name.includes('프로푸트라듀오어드밴스_1단계') || name.includes('프로푸트라듀오어드밴스1단계')) {
          return ['21-02-2027', '19-03-2027', '21-04-2027', '01-06-2027', '21-07-2027', '07-09-2027', '16-09-2027', '21-11-2027'];
        }
        if (name.includes('프로푸트라듀오어드밴스_2단계') || name.includes('프로푸트라듀오어드밴스2단계')) {
          return ['19-01-2027', '16-02-2027', '17-04-2027', '06-06-2027'];
        }
      }
      
      return [];
    }

    // 해당몰 대상여부 계산 (등록된 제품명+제조번호 기반)
    function calculateTargetProduct(prefix, uniqueCodesArray) {
      if (!uniqueCodesArray || uniqueCodesArray.length === 0) return '';
      
      // 모든 제품이 해당몰 Part A 목록에 있는지 확인
      let allMatch = true;
      let hasAnyProduct = false;
      
      for (const uc of uniqueCodesArray) {
        if (!uc || (!uc.productName && !uc.batchNumber)) continue;
        hasAnyProduct = true;
        
        const productName = (uc.productName || '').trim();
        const batchNumber = (uc.batchNumber || '').trim();
        
        if (!productName || !batchNumber) {
          // 제품명이나 제조번호가 없으면 판단 불가
          allMatch = false;
          break;
        }
        
        const allowedBatches = getProductBatchNumbersForPrefix(prefix, productName);
        if (allowedBatches.length === 0) {
          // 해당 제품에 대한 제조번호 목록이 없으면 직접 입력 제품 (판단 불가)
          allMatch = false;
          break;
        }
        
        // 제조번호가 허용 목록에 있는지 확인 (날짜 형식 정규화 필요)
        const normalizedBatch = batchNumber.trim();
        const isInList = allowedBatches.some(b => {
          const normalizedAllowed = b.trim();
          return normalizedBatch === normalizedAllowed;
        });
        
        if (!isInList) {
          allMatch = false;
          break;
        }
      }
      
      if (!hasAnyProduct) return '';
      return allMatch ? 'Y' : 'N';
    }

    function getUniqueCodesArray(d) {
      let arr = d.uniqueCodesData;
      if (Array.isArray(arr)) return arr;
      const codes = Array.isArray(d.uniqueCodes) ? d.uniqueCodes : (d.uniqueCode ? [d.uniqueCode] : []);
      return codes.map(code => ({ productName: '', batchNumber: '', uniqueCode: code || '' }));
    }

    function formatDate(timestamp) {
      if (!timestamp) return '-';
      const d = new Date(timestamp);
      if (isNaN(d.getTime())) return '-';
      return d.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      if (str == null) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    function dataURLtoBlob(dataURL) {
      const parts = dataURL.split(',');
      const meta = parts[0];
      const base64 = parts[1];
      const mimeMatch = meta.match(/data:(.*?);base64/);
      const mime = mimeMatch ? mimeMatch[1] : 'application/octet-stream';
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mime });
    }

    const root = document.getElementById('detailRoot');
    function loadPhotoDetail() {
      if (!id || !prefix) {
        root.innerHTML = '<p class="msg error">접수 ID 또는 프로젝트 정보가 없습니다. 목록에서 사진 보기를 눌러 열어주세요.</p>';
        return;
      }
      const rootRef = dbRef(db);
      const subPath = isLegacy ? prefix + '/submissions/' + id : prefix + '/submissions/' + dateKey + '/' + id;
      const metaPath = dateKey ? (prefix + '/submissions_meta/' + dateKey + '/' + id) : null;
      
      // submissions와 submissions_meta를 동시에 가져오기
      Promise.all([
        get(child(rootRef, subPath)),
        metaPath ? get(child(rootRef, metaPath)).catch(() => null) : Promise.resolve(null)
      ]).then(([snap, metaSnap]) => {
        if (!snap.exists()) {
          root.innerHTML = '<p class="msg error">해당 접수를 찾을 수 없습니다.</p>';
          return;
        }
        const d = snap.val();
        // submissions_meta에서 AI 검토 데이터 병합
        if (metaSnap && metaSnap.exists()) {
          const meta = metaSnap.val();
          if (meta.orderNumber) d.orderNumber = meta.orderNumber;
          if (meta.trackingNumber) d.trackingNumber = meta.trackingNumber;
          if (meta.aiReviewedAt) d.aiReviewedAt = meta.aiReviewedAt;
          if (meta.aiReviewOpinion) d.aiReviewOpinion = meta.aiReviewOpinion;
          if (meta.aiUniqueCodeMatch) d.aiUniqueCodeMatch = meta.aiUniqueCodeMatch;
          // 2차 검증 데이터 병합
          if (meta.aiSecondReviewOrderNumber) d.aiSecondReviewOrderNumber = meta.aiSecondReviewOrderNumber;
          if (meta.aiSecondReviewTrackingNumber) d.aiSecondReviewTrackingNumber = meta.aiSecondReviewTrackingNumber;
          if (meta.aiSecondReviewUniqueCodeMatch) d.aiSecondReviewUniqueCodeMatch = meta.aiSecondReviewUniqueCodeMatch;
          if (meta.aiSecondReviewOpinion) d.aiSecondReviewOpinion = meta.aiSecondReviewOpinion;
          if (meta.aiSecondReviewedAt) d.aiSecondReviewedAt = meta.aiSecondReviewedAt;
        }
        const p1List = getPhotoListFromData(d, 'photo1', 'photo1List');
        const p2List = getPhotoListFromData(d, 'photo2', 'photo2List');
        const p3List = getPhotoListFromData(d, 'photo3', 'photo3List');
        const uniqueCodes = getUniqueCodesArray(d);

        document.getElementById('detailPageTitle').textContent = '고객 상세 · 사진 보기 — ' + (d.name || d.contact || d.id || '');

        let photoHtml = '<div class="photo-column">';
        photoHtml += '<div class="detail-section"><h2>1. 구매 시 영수증</h2><div class="detail-photos"><div class="photo-box"><div class="caption">업로드된 사진</div><div class="photo-box-images">';
        if (p1List.length) p1List.forEach((url) => { photoHtml += '<img src="' + url.replace(/"/g, '&quot;') + '" alt="영수증" class="detail-photo-img" data-url="' + url.replace(/"/g, '&quot;') + '">'; });
        else photoHtml += '<div class="no-image">없음</div>';
        photoHtml += '</div></div></div></div>';
        photoHtml += '<div class="detail-section"><h2>2. 제품 앞면</h2><div class="detail-photos"><div class="photo-box"><div class="caption">업로드된 사진</div><div class="photo-box-images">';
        if (p2List.length) p2List.forEach((url) => { photoHtml += '<img src="' + url.replace(/"/g, '&quot;') + '" alt="제품 앞면" class="detail-photo-img" data-url="' + url.replace(/"/g, '&quot;') + '">'; });
        else photoHtml += '<div class="no-image">없음</div>';
        photoHtml += '</div></div></div></div>';
        photoHtml += '<div class="detail-section"><h2>3. 제품 뒷면/바닥면</h2><div class="detail-photos"><div class="photo-box"><div class="caption">업로드된 사진</div><div class="photo-box-images">';
        if (p3List.length) p3List.forEach((url) => { photoHtml += '<img src="' + url.replace(/"/g, '&quot;') + '" alt="제품 뒷면" class="detail-photo-img" data-url="' + url.replace(/"/g, '&quot;') + '">'; });
        else photoHtml += '<div class="no-image">없음</div>';
        photoHtml += '</div></div></div></div>';
        photoHtml += '</div>';

        let infoHtml = '<div class="info-column">';
        infoHtml += '<div class="detail-section"><h2>고객 정보</h2><div class="info-grid">';
        infoHtml += '<div class="info-item"><label>이름</label><span>' + escapeHtml(d.name || '-') + '</span></div>';
        infoHtml += '<div class="info-item"><label>연락처</label><span>' + escapeHtml(d.contact || '-') + '</span></div>';
        infoHtml += '<div class="info-item"><label>주소</label><span>' + escapeHtml(d.address || '-') + '</span></div>';
        infoHtml += '<div class="info-item"><label>상세주소</label><span>' + escapeHtml(d.addressDetail || '-') + '</span></div>';
        infoHtml += '<div class="info-item"><label>개인통관부호</label><span>' + escapeHtml(d.customsCode || '-') + '</span></div>';
        infoHtml += '<div class="info-item"><label>접수ID</label><span>' + escapeHtml(d.id || '-') + '</span></div>';
        infoHtml += '<div class="info-item"><label>접수일시</label><span>' + escapeHtml(formatDate(d.createdAt)) + '</span></div>';
        infoHtml += '</div></div>';

        if (uniqueCodes.length > 0) {
          infoHtml += '<div class="detail-section"><h2>제품 정보</h2><div class="product-list">';
          uniqueCodes.forEach((uc, idx) => {
            if (!uc.productName && !uc.batchNumber && !uc.uniqueCode) return;
            infoHtml += '<div class="product-item">';
            infoHtml += '<div class="product-name">제품 ' + (idx + 1) + (uc.productName ? ': ' + escapeHtml(uc.productName) : '') + '</div>';
            if (uc.batchNumber) infoHtml += '<div class="product-detail"><strong>제조번호:</strong> ' + escapeHtml(uc.batchNumber) + '</div>';
            if (uc.uniqueCode) infoHtml += '<div class="product-detail"><strong>고유번호:</strong> ' + escapeHtml(uc.uniqueCode) + '</div>';
            infoHtml += '</div>';
          });
          infoHtml += '</div></div>';
        }

        // 주의사항 표시
        if (d.aiReviewedAt || d.aiReviewOpinion || d.orderNumber || d.trackingNumber || d.aiUniqueCodeMatch || d.aiSecondReviewedAt || d.aiSecondReviewOpinion || d.aiSecondReviewOrderNumber || d.aiSecondReviewTrackingNumber || d.aiSecondReviewUniqueCodeMatch) {
          infoHtml += '<div class="detail-section" style="margin-bottom: 12px; padding: 12px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px;">';
          infoHtml += '<div style="font-size: 12px; color: #856404; line-height: 1.6;">';
          infoHtml += '<strong>⚠️ 주의사항:</strong> AI 검토 결과는 <strong>참고용으로만</strong> 사용해주세요. 사진상 빛번짐이나 음영이 낮을 경우 인식이 안되는 것이 정상이니 참고 바랍니다.';
          infoHtml += '</div></div>';
        }
        
        // 2차 검증 결과 표시 (최신 검토 결과를 위에)
        if (d.aiSecondReviewedAt || d.aiSecondReviewOpinion || d.aiSecondReviewOrderNumber || d.aiSecondReviewTrackingNumber || d.aiSecondReviewUniqueCodeMatch) {
          infoHtml += '<div class="detail-section ai-review-block" style="background: #2d2d2d;"><h2 style="color:#fff;margin-bottom:12px;">2차 AI 검토 결과</h2><div class="info-grid">';
          infoHtml += '<div class="info-item" title="2차 검증에서 확인된 주문번호"><label>주문번호</label><span>' + escapeHtml(d.aiSecondReviewOrderNumber || '-') + '</span></div>';
          infoHtml += '<div class="info-item" title="2차 검증에서 확인된 송장번호"><label>송장번호</label><span>' + escapeHtml(d.aiSecondReviewTrackingNumber || '-') + '</span></div>';
          infoHtml += '<div class="info-item" title="2차 검증에서 확인된 제조·고유매칭"><label>제조·고유매칭</label><span>' + escapeHtml((d.aiSecondReviewUniqueCodeMatch === 'Y' || d.aiSecondReviewUniqueCodeMatch === 'N') ? d.aiSecondReviewUniqueCodeMatch : '정보부족') + '</span></div>';
          infoHtml += '<div class="info-item"><label>2차 검증일시</label><span>' + escapeHtml(d.aiSecondReviewedAt ? d.aiSecondReviewedAt.replace('T', ' ').slice(0, 19) : '-') + '</span></div>';
          infoHtml += '</div>';
          if (d.aiSecondReviewOpinion) {
            infoHtml += '<div class="info-item" style="margin-top:8px;"><label>2차 검증 의견</label><div class="ai-opinion-box">' + escapeHtml(d.aiSecondReviewOpinion) + '</div></div>';
          } else {
            infoHtml += '<div class="info-item" style="margin-top:8px;"><label>2차 검증 의견</label><span style="color:#888;">의견 없음</span></div>';
          }
          infoHtml += '</div>';
        }
        
        // 1차 AI 검토 결과 표시 (이전 검토 결과를 아래에)
        if (d.aiReviewedAt || d.aiReviewOpinion || d.orderNumber || d.trackingNumber || d.aiUniqueCodeMatch) {
          infoHtml += '<div class="detail-section ai-review-block" style="margin-top: 16px;"><h2 style="color:#fff;margin-bottom:12px;">1차 AI 검토 결과</h2><div class="info-grid">';
          // 해당몰 대상여부: 등록된 제품명+제조번호로 자체 계산
          const u = getUniqueCodesArray(d);
          const targetProductValue = calculateTargetProduct(prefix, u);
          infoHtml += '<div class="info-item" title="Y/N 기준: 제출된 사이트(몰) Part A 제품·제조번호 허용 목록에 포함되는지 (자체 계산)"><label>해당몰 대상여부</label><span>' + escapeHtml((targetProductValue === 'Y' || targetProductValue === 'N') ? targetProductValue : '정보부족') + '</span></div>';
          infoHtml += '<div class="info-item" title="1번 구매영수증에서 확인된 주문번호"><label>주문번호</label><span>' + escapeHtml(d.orderNumber || '-') + '</span></div>';
          infoHtml += '<div class="info-item" title="1번 구매영수증에서 확인된 송장번호"><label>송장번호</label><span>' + escapeHtml(d.trackingNumber || '-') + '</span></div>';
          infoHtml += '<div class="info-item" title="Y/N: 3번 사진 수=등록 건수, 제조번호+고유번호 캔별 매칭(전산 중복접수 기준)"><label>제조·고유매칭</label><span>' + escapeHtml((d.aiUniqueCodeMatch === 'Y' || d.aiUniqueCodeMatch === 'N') ? d.aiUniqueCodeMatch : '정보부족') + '</span></div>';
          infoHtml += '<div class="info-item"><label>AI검토일시</label><span>' + escapeHtml(d.aiReviewedAt ? d.aiReviewedAt.replace('T', ' ').slice(0, 19) : '-') + '</span></div>';
          infoHtml += '</div>';
          if (d.aiReviewOpinion) {
            infoHtml += '<div class="info-item" style="margin-top:8px;"><label>AI검토의견</label><div class="ai-opinion-box">' + escapeHtml(d.aiReviewOpinion) + '</div></div>';
          } else {
            infoHtml += '<div class="info-item" style="margin-top:8px;"><label>AI검토의견</label><span style="color:#888;">미검토</span></div>';
          }
          infoHtml += '</div>';
        }
        
        infoHtml += '</div>';

        root.innerHTML = photoHtml + infoHtml;

        const overlay = document.getElementById('photoZoomOverlay');
        const zoomImg = document.getElementById('photoZoomImg');
        const closeBtn = overlay.querySelector('.photo-zoom-close');
        const prevBtn = document.getElementById('photoZoomPrev');
        const nextBtn = document.getElementById('photoZoomNext');
        const counter = document.getElementById('photoZoomCounter');
        const hint = document.getElementById('photoZoomHint');
        
        let allPhotos = [];
        let currentPhotoIndex = -1;
        let zoomLevel = 1.0;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartTranslateX = 0;
        let dragStartTranslateY = 0;
        const minZoom = 1.0;
        const maxZoom = 5.0;
        const zoomStep = 0.1;

        function collectAllPhotos() {
          allPhotos = [];
          const p1List = getPhotoListFromData(d, 'photo1', 'photo1List');
          const p2List = getPhotoListFromData(d, 'photo2', 'photo2List');
          const p3List = getPhotoListFromData(d, 'photo3', 'photo3List');
          p1List.forEach(url => allPhotos.push({ url, label: '구매 시 영수증' }));
          p2List.forEach(url => allPhotos.push({ url, label: '제품 앞면' }));
          p3List.forEach(url => allPhotos.push({ url, label: '제품 뒷면/바닥면' }));
        }

        function constrainPosition() {
          if (zoomLevel <= 1.0) {
            translateX = 0;
            translateY = 0;
            return;
          }
          const imgRect = zoomImg.getBoundingClientRect();
          const overlayRect = overlay.getBoundingClientRect();
          const imgDisplayWidth = imgRect.width / zoomLevel;
          const imgDisplayHeight = imgRect.height / zoomLevel;
          const scaledWidth = imgDisplayWidth * zoomLevel;
          const scaledHeight = imgDisplayHeight * zoomLevel;
          const maxX = Math.max(0, (scaledWidth - overlayRect.width) / 2);
          const maxY = Math.max(0, (scaledHeight - overlayRect.height) / 2);
          translateX = Math.max(-maxX, Math.min(maxX, translateX));
          translateY = Math.max(-maxY, Math.min(maxY, translateY));
        }

        function applyTransform() {
          zoomImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomLevel})`;
          if (zoomLevel > 1.0) {
            zoomImg.classList.add('zoomed');
          } else {
            zoomImg.classList.remove('zoomed');
          }
        }

        function zoomIn() {
          const oldZoom = zoomLevel;
          zoomLevel = Math.min(zoomLevel + zoomStep, maxZoom);
          const zoomRatio = zoomLevel / oldZoom;
          translateX *= zoomRatio;
          translateY *= zoomRatio;
          constrainPosition();
          applyTransform();
        }

        function zoomOut() {
          const oldZoom = zoomLevel;
          zoomLevel = Math.max(zoomLevel - zoomStep, minZoom);
          const zoomRatio = zoomLevel / oldZoom;
          translateX *= zoomRatio;
          translateY *= zoomRatio;
          constrainPosition();
          applyTransform();
        }

        function resetZoom() {
          zoomLevel = 1.0;
          translateX = 0;
          translateY = 0;
          applyTransform();
        }

        function showZoom(index) {
          if (index < 0 || index >= allPhotos.length) return;
          currentPhotoIndex = index;
          const photo = allPhotos[index];
          resetZoom();
          zoomImg.src = photo.url;
          counter.textContent = (index + 1) + ' / ' + allPhotos.length;
          updateNavButtons();
          overlay.classList.add('show');
          hint.classList.remove('hidden');
          setTimeout(() => {
            hint.classList.add('hidden');
          }, 5000);
        }

        function hideZoom() {
          overlay.classList.remove('show');
          zoomImg.src = '';
          resetZoom();
          currentPhotoIndex = -1;
        }

        function updateNavButtons() {
          prevBtn.classList.toggle('disabled', currentPhotoIndex <= 0);
          nextBtn.classList.toggle('disabled', currentPhotoIndex >= allPhotos.length - 1);
        }

        function showPrev() {
          if (currentPhotoIndex > 0) {
            showZoom(currentPhotoIndex - 1);
          }
        }

        function showNext() {
          if (currentPhotoIndex < allPhotos.length - 1) {
            showZoom(currentPhotoIndex + 1);
          }
        }

        overlay.addEventListener('click', (e) => {
          if (e.target === overlay || e.target === closeBtn) hideZoom();
        });

        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!prevBtn.classList.contains('disabled')) showPrev();
        });

        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!nextBtn.classList.contains('disabled')) showNext();
        });

        document.addEventListener('keydown', (e) => {
          if (!overlay.classList.contains('show')) return;
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            showPrev();
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            showNext();
          } else if (e.key === 'Escape') {
            e.preventDefault();
            hideZoom();
          } else if (e.key === '+' || e.key === '=') {
            e.preventDefault();
            zoomIn();
          } else if (e.key === '-' || e.key === '_') {
            e.preventDefault();
            zoomOut();
          } else if (e.key === '0') {
            e.preventDefault();
            resetZoom();
          }
        });

        overlay.addEventListener('wheel', (e) => {
          if (!overlay.classList.contains('show')) return;
          e.preventDefault();
          if (e.ctrlKey || e.metaKey) {
            // Ctrl/Cmd + 휠: 확대/축소
            if (e.deltaY < 0) {
              zoomIn();
            } else {
              zoomOut();
            }
          } else {
            // 일반 휠: 드래그 이동 (스크롤)
            if (zoomLevel > 1.0) {
              const scrollSpeed = 2;
              translateX -= e.deltaX * scrollSpeed;
              translateY -= e.deltaY * scrollSpeed;
              constrainPosition();
              applyTransform();
            }
          }
        }, { passive: false });

        zoomImg.addEventListener('mousedown', (e) => {
          if (zoomLevel > 1.0) {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartTranslateX = translateX;
            dragStartTranslateY = translateY;
            zoomImg.style.cursor = 'grabbing';
          }
        });

        document.addEventListener('mousemove', (e) => {
          if (!isDragging || !overlay.classList.contains('show')) return;
          const deltaX = e.clientX - dragStartX;
          const deltaY = e.clientY - dragStartY;
          translateX = dragStartTranslateX + deltaX;
          translateY = dragStartTranslateY + deltaY;
          constrainPosition();
          applyTransform();
        });

        document.addEventListener('mouseup', () => {
          if (isDragging) {
            isDragging = false;
            if (zoomLevel > 1.0) {
              zoomImg.style.cursor = 'move';
            }
          }
        });

        collectAllPhotos();

        root.querySelectorAll('.detail-photo-img').forEach((img, idx) => {
          img.addEventListener('click', () => {
            const url = img.getAttribute('data-url');
            if (!url) return;
            try {
              const photoIndex = allPhotos.findIndex(p => p.url === url);
              if (photoIndex >= 0) {
                showZoom(photoIndex);
              }
            } catch (err) { 
              alert('사진을 열 수 없습니다.'); 
            }
          });
        });
      }).catch(err => {
        root.innerHTML = '<p class="msg error">불러오기 실패: ' + (err.message || err) + '</p>';
      });
    }

    loadPhotoDetail();
  </script>
</body>
</html>
